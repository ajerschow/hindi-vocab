ious / burdensome / intense / severe",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"यह बॉक्स बहुत भारी है।",transliteration:"Yah bŏks bahut bhārī hai.",translation:"This box is very heavy. (present)"},{sentence:"उसे भारी दिल से यह खबर सुनानी पड़ी।",transliteration:"Use bhārī dil se yah khabar sunānī paṛī.",translation:"She had to tell him this news with a heavy heart. (past)"}],id:"bulk_1780537684207_86"},{devanagari:"भाषा",transliteration:"bhāṣā",meaning:"language / speech / dialect",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"हिंदी भाषा भारत में सबसे ज्यादा बोली जाती है।",transliteration:"hindī bhāṣā bhārat mẽ sabse jyādā bolī jātī hai.",translation:"The Hindi language is spoken the most in India. (present)"},{sentence:"मुझे पाँच भाषाएँ आती हैं।",transliteration:"mujhe pã̄c bhāṣāẽ ātī hã̄.",translation:"I know five languages. (present)"}],id:"bulk_1780537686365_87"},{devanagari:"भिजवाना",transliteration:"bhijvānā",meaning:"to send / to cause to be sent / to dispatch",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"मैंने अपने भाई को बाजार भिजवाया।",transliteration:"maiṁne apne bhāī ko bāzār bhijvāyā.",translation:"I sent my brother to the market. (past)"},{sentence:"वह अपनी बेटी को स्कूल भिजवाती है।",transliteration:"vah apnī beṭī ko skūl bhijvātī hai.",translation:"She sends her daughter to school. (present)"}],id:"bulk_1780537688412_88"},{devanagari:"भी",transliteration:"bhī",meaning:"also / too / even / as well",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"मैं भी वहाँ जाऊँगा।",transliteration:"Maiṁ bhī vahāṁ jāūṁgā.",translation:"I will also go there. (future)"},{sentence:"वह भी एक अच्छा छात्र है।",transliteration:"Vah bhī ek achhā chātr hai.",translation:"He is also a good student. (present)"}],id:"bulk_1780537690460_89"},{devanagari:"भूख",transliteration:"bhūkh",meaning:"hunger / appetite",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"मुझे बहुत भूख लग रही है।",transliteration:"mujhe bahut bhūkh lag rahī hai.",translation:"I am very hungry. (present)"},{sentence:"भूख मिटाने के लिए उसने खाना खा लिया।",transliteration:"bhūkh miṭāne ke lie usne khānā khā liyā.",translation:"He ate food to satisfy his hunger. (past)"}],id:"bulk_1780537692919_90"},{devanagari:"भूख लगना",transliteration:"bhūkh lagnā",meaning:"to feel hungry / to become hungry",category:"verb",gender:null,transitive:!1,unit:null,examples:[{sentence:"मुझे सुबह से भूख लग रही है।",transliteration:"mujhe subah se bhūkh lag rahī hai.",translation:"I have been feeling hungry since morning. (present continuous)"},{sentence:"दौड़ने के बाद उसे तेज़ भूख लगी।",transliteration:"daudne ke bād use tez bhūkh lagī.",translation:"He felt intense hunger after running. (past)"}],id:"bulk_1780537694880_91"},{devanagari:"भेजना",transliteration:"bhejnā",meaning:"to send / to dispatch / to forward",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"मैंने अपने दोस्त को एक पत्र भेजा।",transliteration:"maiṁne apne dost ko ek patr bhejā.",translation:"I sent a letter to my friend. (past)"},{sentence:"वह कल मुझे एक पैकेज भेजेगा।",transliteration:"vah kal mujhe ek pakaij bhejegā.",translation:"He will send me a package tomorrow. (future)"}],id:"bulk_1780537696634_92"},{devanagari:"मंदिर",transliteration:"mandir",meaning:"temple / shrine",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"हम हर सप्ताह मंदिर जाते हैं।",transliteration:"Ham har saptāh mandir jāte haiṁ.",translation:"We go to the temple every week. (present)"},{sentence:"यह मंदिर बहुत पुराना है।",transliteration:"Yah mandir bahut purānā hai.",translation:"This temple is very old. (present)"}],id:"bulk_1780537698618_93"},{devanagari:"मकान",transliteration:"makān",meaning:"house / building / structure",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"यह मकान बहुत पुराना है।",transliteration:"yah makān bahut purānā hai.",translation:"This house is very old. (present)"},{sentence:"उसने नया मकान खरीदा।",transliteration:"usnē nayā makān kharīdā.",translation:"He/She bought a new house. (past)"}],id:"bulk_1780537700804_94"},{devanagari:"मज़ा",transliteration:"mazā",meaning:"fun / enjoyment / pleasure / joke",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"बच्चों को पार्क में बहुत मज़ा आया।",transliteration:"bachchõ ko pārk mẽ bahut mazā āyā.",translation:"The children had a lot of fun in the park. (past)"},{sentence:"क्या तुम्हें यह फिल्म देखने में मज़ा आएगा?",transliteration:"kyā tumhẽ yah film dekhne mẽ mazā āegā?",translation:"Will you enjoy watching this movie? (future)"}],id:"bulk_1780537703056_95"},{devanagari:"मज़े करना",transliteration:"maze karnā",meaning:"to have fun / to enjoy / to make merry",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"बच्चे पार्क में मज़े कर रहे हैं।",transliteration:"bacche pārk mẽ maze kar rahe haiṁ.",translation:"The children are having fun in the park. (present continuous)"},{sentence:"हम गर्मी की छुट्टियों में बहुत मज़े किए।",transliteration:"ham garmī kī chuttiyõ mẽ bahut maze kie.",translation:"We had a lot of fun during the summer holidays. (past)"}],id:"bulk_1780537705310_96"},{devanagari:"मत",transliteration:"mat",meaning:"opinion / view / belief / school of thought / do not (negative imperative)",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"मेरे मत में यह सही है।",transliteration:"mere mat mein yah sahi hai.",translation:"In my opinion, this is correct. (present)"},{sentence:"मत जाओ, यहीं रहो।",transliteration:"mat jao, yahi raho.",translation:"Don't go, stay here. (negative imperative)"}],id:"bulk_1780537707255_97"},{devanagari:"मतलब",transliteration:"matlab",meaning:"meaning / point / purpose / intention",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"इस शब्द का मतलब क्या है?",transliteration:"is shabd kā matlab kyā hai?",translation:"What is the meaning of this word? (present)"},{sentence:"मेरा मतलब तुम्हें बुरा लगाना नहीं था।",transliteration:"merā matlab tumhẽ burā lagānā nahī̃ thā.",translation:"I didn't mean to hurt you. (past)"}],id:"bulk_1780537709303_98"},{devanagari:"मदद",transliteration:"madad",meaning:"help / assistance / aid / support",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"मुझे इस काम में मदद की जरूरत है।",transliteration:"mujhe is kām mẽ madad kī zarūrat hai.",translation:"I need help with this work. (present)"},{sentence:"उसने मुझे मदद करने का वचन दिया।",transliteration:"usne mujhe madad karne kā vachān diyā.",translation:"He/She promised to help me. (past)"}],id:"bulk_1780537711355_99"},{devanagari:"किसी की मदद करनी",transliteration:"kisī kī madad karnī",meaning:"to help someone / to assist someone / to provide help to someone",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"हमें हमेशा जरूरतमंद लोगों की मदद करनी चाहिए।",transliteration:"hamēṁ hamēśā zarūratmand logõ kī madad karnī chāhie.",translation:"We should always help those in need. (present/habitual)"},{sentence:"उसने अपने दोस्त की मदद की जब वह परेशान था।",transliteration:"usnē apnē dost kī madad kī jab vah parēśān thā.",translation:"He helped his friend when he was troubled. (past)"}],id:"bulk_1780537714112_100"},{devanagari:"मरीज़",transliteration:"marīz",meaning:"patient (medical) / sick person",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"डॉक्टर ने मरीज़ को दवाई दी।",transliteration:"ḍŏkṭar ne marīz ko davāī dī.",translation:"The doctor gave medicine to the patient. (past)"},{sentence:"अस्पताल में कई मरीज़ भर्ती हैं।",transliteration:"aspatāl mẽ kaī marīz bhartī haiṁ.",translation:"Several patients are admitted in the hospital. (present)"}],id:"bulk_1780537716165_101"},{devanagari:"महँगा",transliteration:"mahãgā",meaning:"expensive / costly / dear",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"यह कार बहुत महँगी है।",transliteration:"yah kār bahut mahãgī hai.",translation:"This car is very expensive. (present)"},{sentence:"उस दुकान में कपड़े महँगे हैं।",transliteration:"us dukān mẽ kapṛe mahãge haiṁ.",translation:"The clothes are expensive in that shop. (present)"}],id:"bulk_1780537721284_102"},{devanagari:"महसूस करना",transliteration:"mahsūs karnā",meaning:"to feel / to sense / to experience / to perceive",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"मुझे बहुत ठंड महसूस हो रही है।",transliteration:"mujhe bahut ṭhānd mahsūs ho rahī hai.",translation:"I am feeling very cold. (present progressive)"},{sentence:"उसने अपने दिल में एक अलग भावना महसूस की।",transliteration:"usne apne dil meṁ ek alag bhāvanā mahsūs kī.",translation:"He felt a different emotion in his heart. (past)"}],id:"bulk_1780537723639_103"},{devanagari:"महसूस होना",transliteration:"mahsūs honā",meaning:"to feel / to sense / to perceive / to experience",category:"verb",gender:null,transitive:!1,unit:null,examples:[{sentence:"मुझे एक अजीब सी भावना महसूस हो रही है।",transliteration:"mujhe ek ajīb sī bhāvanā mahsūs ho rahī hai.",translation:"I am feeling a strange sensation. (present continuous)"},{sentence:"उसने अपनी गलती को महसूस कर लिया।",transliteration:"usne apnī galtī ko mahsūs kar liyā.",translation:"He realized his mistake. (past)"}],id:"bulk_1780537727410_104"},{devanagari:"महिला",transliteration:"mahilā",meaning:"woman / lady",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"वह महिला बहुत मेहनती है।",transliteration:"vah mahilā bahut mehnatī hai.",translation:"That woman is very hardworking. (present)"},{sentence:"इस दुकान पर एक महिला काम करती है।",transliteration:"is dukān par ek mahilā kām kartī hai.",translation:"A woman works at this shop. (present)"}],id:"bulk_1780537729171_105"},{devanagari:"महीना",transliteration:"mahīnā",meaning:"month / lunar month",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"यह महीना बहुत गर्म है।",transliteration:"yah mahīnā bahut garm hai.",translation:"This month is very hot. (present)"},{sentence:"मैं अगले महीने दिल्ली जाऊँगा।",transliteration:"maiṁ agle mahīne dillī jāūँgā.",translation:"I will go to Delhi next month. (future)"}],id:"bulk_1780537731115_106"},{devanagari:"माँ",transliteration:"mā̃",meaning:"mother / mom",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"मेरी माँ बहुत प्यारी है।",transliteration:"merī mā̃ bahut pyārī hai.",translation:"My mother is very lovely. (present)"},{sentence:"माँ ने मुझे खाना बनाया।",transliteration:"mā̃ ne mujhe khānā banāyā.",translation:"Mother made food for me. (past)"}],id:"bulk_1780537733266_107"},{devanagari:"माँ-बाप",transliteration:"mā̃-bāp",meaning:"parents / mother and father",category:"noun",gender:"m/f",transitive:null,unit:null,examples:[{sentence:"मेरे माँ-बाप मुझसे बहुत प्यार करते हैं।",transliteration:"mere mā̃-bāp mujhse bahut pyār karte haiṁ.",translation:"My parents love me very much. (present)"},{sentence:"उसके माँ-बाप कल घर आएंगे।",transliteration:"uske mā̃-bāp kal ghar āeṁge.",translation:"His/her parents will come home tomorrow. (future)"}],id:"bulk_1780537735415_108"},{devanagari:"माँगना",transliteration:"māṅgnā",meaning:"to ask for / to demand / to beg / to request",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"बच्चा अपनी माँ से खिलौना माँग रहा है।",transliteration:"Baccā apnī māṁ se khilaunā māṅg rahā hai.",translation:"The child is asking his mother for a toy. (present continuous)"},{sentence:"उन्होंने मुझसे पैसे माँगे।",transliteration:"Unhone mujhse paise māṅge.",translation:"They asked me for money. (past)"}],id:"bulk_1780537737858_109"},{devanagari:"माँजना",transliteration:"mãjnā",meaning:"to scrub / to rub / to polish / to clean by rubbing",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"वह बर्तन माँज रही है।",transliteration:"vah bartan mãj rahī hai.",translation:"She is scrubbing the vessel. (present continuous)"},{sentence:"मैंने फर्श को अच्छे से माँजा।",transliteration:"maiṁne farsh ko achhē se mãjā.",translation:"I scrubbed the floor thoroughly. (past)"}],id:"bulk_1780537981487_0"},{devanagari:"माता",transliteration:"mātā",meaning:"mother / goddess (honorific)",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"मेरी माता बहुत दयालु हैं।",transliteration:"merī mātā bahut dayālu haiṁ.",translation:"My mother is very kind. (present)"},{sentence:"माता दुर्गा को हम सब पूजते हैं।",transliteration:"mātā durgā ko ham sab pūjte haiṁ.",translation:"We all worship Goddess Durga. (present)"}],id:"bulk_1780537983377_1"},{devanagari:"माता-पिता",transliteration:"mātā-pitā",meaning:"parents / mother and father",category:"noun",gender:"m/f",transitive:null,unit:null,examples:[{sentence:"मेरे माता-पिता मुंबई में रहते हैं।",transliteration:"mere mātā-pitā mumbai meṁ rahte haiṁ.",translation:"My parents live in Mumbai. (present)"},{sentence:"बच्चों को अपने माता-पिता का सम्मान करना चाहिए।",transliteration:"bachchoṁ ko apne mātā-pitā kā sammān karnā chāhie.",translation:"Children should respect their parents. (present)"}],id:"bulk_1780537985787_2"},{devanagari:"माथा",transliteration:"māthā",meaning:"forehead / brow / front part of the head above the eyes",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"उसके माथे पर पसीना था।",transliteration:"uske māthe par pasīnā thā.",translation:"There was sweat on his forehead. (past)"},{sentence:"बच्चे ने अपने माथे को हाथ से छुआ।",transliteration:"bache ne apne māthe ko hāth se chuā.",translation:"The child touched his forehead with his hand. (past)"}],id:"bulk_1780537987689_3"},{devanagari:"माफ़ी",transliteration:"māfī",meaning:"forgiveness / pardon / apology / excuse",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"मुझे अपनी गलती के लिए माफ़ी माँगनी चाहिए।",transliteration:"mujhe apnī galtī ke lie māfī māṅgnī chāhie.",translation:"I should ask for forgiveness for my mistake. (present)"},{sentence:"उसने उसकी माफ़ी स्वीकार कर ली।",transliteration:"usne uskī māfī svīkār kar lī.",translation:"He accepted his apology. (past)"}],id:"bulk_1780537989791_4"},{devanagari:"माफ़ी माँगना",transliteration:"māfī māṅgnā",meaning:"to apologize / to ask for forgiveness / to beg pardon",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"उसने अपनी गलती के लिए माफ़ी माँगी।",transliteration:"usnē apnī galtī kē liē māfī māṅgī.",translation:"He asked for forgiveness for his mistake. (past)"},{sentence:"मुझे माफ़ी माँगनी चाहिए क्योंकि मैंने गलत कहा।",transliteration:"mujhē māfī māṅgnī chāhiē kyōṅki maiṅnē galat kahā.",translation:"I should apologize because I said something wrong. (present conditional)"}],id:"bulk_1780537992750_5"},{devanagari:"मामूली",transliteration:"māmūlī",meaning:"ordinary / common / trivial / insignificant / usual",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"यह एक मामूली सी बात है।",transliteration:"Yah ek māmūlī sī bāt hai.",translation:"This is a trivial matter. (present)"},{sentence:"मामूली कर्मचारी के लिए इतना बड़ा काम करना असंभव था।",transliteration:"Māmūlī karmchārī ke lie itnā bṛā kām krnā asmabhav thā.",translation:"For an ordinary employee, doing such a big task was impossible. (past)"}],id:"bulk_1780537995414_6"},{devanagari:"मारना",transliteration:"mārnā",meaning:"to hit / to strike / to kill / to beat",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"उसने गेंद को बैट से मारा।",transliteration:"Usne gend ko bait se mārā.",translation:"He hit the ball with a bat. (past)"},{sentence:"वह हर दिन सुबह दौड़ने जाता है।",transliteration:"Mausam bahut garma hai, isliye main ghar par hi rahna pasand karta hoon.",translation:"She beats the carpet with a stick every morning. (present habitual)"}],id:"bulk_1780537997870_7"},{devanagari:"माल",transliteration:"māl",meaning:"goods / merchandise / cargo / property / wealth / material",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"दुकान में बहुत सारा माल रखा है।",transliteration:"dukān meṁ bahut sārā māl rakhā hai.",translation:"There is a lot of merchandise kept in the shop. (present)"},{sentence:"ट्रेन माल से भरी हुई थी।",transliteration:"ṭren māl se bharī huī thī.",translation:"The train was filled with cargo. (past)"}],id:"bulk_1780538000021_8"},{devanagari:"मालूम",transliteration:"mālūm",meaning:"known / understood / apparent / to know / to be aware of",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"मुझे नहीं मालूम कि वह कहाँ गया।",transliteration:"mujhe nahī̃ mālūm ki vah kahā̃ gayā.",translation:"I don't know where he went. (present)"},{sentence:"क्या तुम्हें हिंदी आती है? हाँ, मुझे मालूम है।",transliteration:"kyā tumhẽ hindī ātī hai? hā̃, mujhe mālūm hai.",translation:"Do you know Hindi? Yes, I know it. (present)"}],id:"bulk_1780538002351_9"},{devanagari:"मालूम नहीं",transliteration:"mālūm nahī̃",meaning:"I don't know / one doesn't know / unknown",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"मुझे मालूम नहीं कि वह कहाँ गया।",transliteration:"mujhe mālūm nahī̃ ki vah kahā̃ gayā.",translation:"I don't know where he went. (present)"},{sentence:"क्या तुम्हें यह पता है? नहीं, मालूम नहीं।",transliteration:"kyā tumhẽ yah patā hai? nahī̃, mālūm nahī̃.",translation:"Do you know this? No, I don't know. (present)"}],id:"bulk_1780538004870_10"},{devanagari:"मार्ग",transliteration:"māarg",meaning:"path / road / way / route / direction",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"यह मार्ग शहर के बीच से गुजरता है।",transliteration:"Yah māarg shahar ke beech se gujrata hai.",translation:"This road passes through the middle of the city. (present)"},{sentence:"हमने सही मार्ग का चयन किया।",transliteration:"Hamne sahi māarg ka chayan kiya.",translation:"We chose the right path. (past)"}],id:"bulk_1780538006807_11"},{devanagari:"मिठाई",transliteration:"miṭhāī",meaning:"sweets / confectionery / candy",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"दिवाली पर हम घर में मिठाई बनाते हैं।",transliteration:"divālī par ham ghar mẽ miṭhāī banāte haiṁ.",translation:"We make sweets at home during Diwali. (present habitual)"},{sentence:"बाजार से मिठाई खरीद कर लाओ।",transliteration:"bāzār se miṭhāī kharīd kar lāo.",translation:"Buy sweets from the market and bring them. (imperative)"}],id:"bulk_1780538009194_12"},{devanagari:"मिठास",transliteration:"miṭhās",meaning:"sweetness / sugar content / pleasant quality",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"इस फल की मिठास बहुत अच्छी है।",transliteration:"Is phal kī miṭhās bahut achhī hai.",translation:"The sweetness of this fruit is very good. (present)"},{sentence:"आम की मिठास सभी को पसंद आती है।",transliteration:"Ām kī miṭhās sabhī ko pasand ātī hai.",translation:"Everyone likes the sweetness of mangoes. (present habitual)"}],id:"bulk_1780538011167_13"},{devanagari:"मिलना",transliteration:"milnā",meaning:"to meet / to find / to get / to be available / to match / to blend",category:"verb",gender:null,transitive:!1,unit:null,examples:[{sentence:"कल मुझे बाजार में एक पुरानी किताब मिली।",transliteration:"Kal mujhe bāzār mein ek purānī kitāb milī.",translation:"Yesterday I found an old book in the market. (past)"},{sentence:"अगर आप कड़ी मेहनत करोगे तो आपको सफलता मिलेगी।",transliteration:"Agar āp karhī mehnat karoge to āpko saflta milegī.",translation:"If you work hard, you will get success. (future)"}],id:"bulk_1780538013729_14"},{devanagari:"मीठा",transliteration:"mīṭhā",meaning:"sweet / pleasant",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"यह आम बहुत मीठा है।",transliteration:"yah ām bahut mīṭhā hai.",translation:"This mango is very sweet. (present)"},{sentence:"उसकी मीठी आवाज सभी को पसंद है।",transliteration:"uskī mīṭhī āvāz sabhī ko pasand hai.",translation:"Her sweet voice is liked by everyone. (present)"}],id:"bulk_1780538017865_15"},{devanagari:"मुँह",transliteration:"muṁh",meaning:"mouth / face",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"बच्चे ने अपना मुँह धो लिया।",transliteration:"bacche ne apnā muṁh dho liyā.",translation:"The child washed his mouth/face. (past)"},{sentence:"उसका मुँह हमेशा खुशी से चमकता है।",transliteration:"uskā muṁh hameshā khushī se chamktā hai.",translation:"His face always shines with happiness. (present)"}],id:"bulk_1780538019912_16"},{devanagari:"मुड़ना",transliteration:"muṛnā",meaning:"to turn / to bend / to twist / to wind",category:"verb",gender:null,transitive:!1,unit:null,examples:[{sentence:"सड़क दाईं ओर मुड़ती है।",transliteration:"sāṛak dāīṁ or muṛtī hai.",translation:"The road turns to the right. (present)"},{sentence:"वह गली में मुड़ गया।",transliteration:"vah galī meṁ muṛ gayā.",translation:"He turned into the lane. (past)"}],id:"bulk_1780538021934_17"},{devanagari:"मुफ़्त का",transliteration:"muft kā",meaning:"free / complimentary / without charge / for nothing",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"यह किताब मुफ़्त का है।",transliteration:"yah kitāb muft kā hai.",translation:"This book is free. (present)"},{sentence:"उन्होंने मुझे मुफ़्त का खाना दिया।",transliteration:"unhonē mujhē muft kā khānā diyā.",translation:"They gave me free food. (past)"}],id:"bulk_1780538023750_18"},{devanagari:"मुफ़्त में",transliteration:"muft meṁ",meaning:"for free / free of charge / without payment",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"यह किताब मुफ़्त में मिल गई।",transliteration:"yah kitāb muft meṁ mil gaī.",translation:"This book was obtained for free. (past)"},{sentence:"वह मुफ़्त में काम नहीं करेगा।",transliteration:"vah muft meṁ kām nahīṁ karegā.",translation:"He will not work for free. (future)"}],id:"bulk_1780538026590_19"},{devanagari:"मुश्किल",transliteration:"muśkil",meaning:"difficult / hard / problem / trouble / hardship",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"यह प्रश्न बहुत मुश्किल है।",transliteration:"yah praśn bahut muśkil hai.",translation:"This question is very difficult. (present)"},{sentence:"मुझे यह काम पूरा करना मुश्किल लग रहा है।",transliteration:"mujhe yah kām pūrā karnā muśkil lag rahā hai.",translation:"This work seems difficult to me to complete. (present continuous)"}],id:"bulk_1780538028716_20"},{devanagari:"मुश्किल से",transliteration:"muśkil se",meaning:"with difficulty / hardly / scarcely / barely",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"वह मुश्किल से सीढ़ियों पर चढ़ पाया।",transliteration:"vah muśkil se sīṛhiyom par chṛh pāyā.",translation:"He managed to climb the stairs with great difficulty. (past)"},{sentence:"मुश्किल से ही मेरा काम पूरा हुआ।",transliteration:"muśkil se hī merā kām pūrā huā.",translation:"My work was barely completed. (past)"}],id:"bulk_1780538030869_21"},{devanagari:"मुस्कराना",transliteration:"muskrānā",meaning:"to smile / to grin",category:"verb",gender:null,transitive:!1,unit:null,examples:[{sentence:"वह मेरी बात सुनकर मुस्कुरा दिया।",transliteration:"vah merī bāt sunkar muskurā diyā.",translation:"He smiled upon hearing my words. (past)"},{sentence:"बच्चा हर समय मुस्कुरा रहा है।",transliteration:"baccā har samay muskurā rahā hai.",translation:"The child is smiling all the time. (present continuous)"}],id:"bulk_1780538032689_22"},{devanagari:"मेज़",transliteration:"mez",meaning:"table / desk",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"मेज़ पर किताब रखी है।",transliteration:"mez par kitaab rakhi hai.",translation:"The book is placed on the table. (present)"},{sentence:"वह मेज़ के पास बैठ गया।",transliteration:"vah mez ke pas baith gaya.",translation:"He sat down near the desk. (past)"}],id:"bulk_1780538034324_23"},{devanagari:"मेमसाहब",transliteration:"memsāhab",meaning:"memsahib / European or Anglo-Indian lady / wife of a sahib",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"मेमसाहब ने नौकर को खाना तैयार करने के लिए कहा।",transliteration:"memsāhab ne naukar ko khānā tayyār karne ke lie kahā.",translation:"The memsahib asked the servant to prepare the food. (past)"},{sentence:"मेमसाहब बगीचे में फूल तोड़ रही हैं।",transliteration:"memsāhab bagīche mein phūl toṛ rahī haiṁ.",translation:"The memsahib is plucking flowers in the garden. (present continuous)"}],id:"bulk_1780538037414_24"},{devanagari:"मेहनत",transliteration:"mehnat",meaning:"hard work / labour / toil / effort",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"सफलता के लिए कड़ी मेहनत करनी पड़ती है।",transliteration:"safaltā ke lie kaṛī mehnat karnī paṛtī hai.",translation:"Hard work is required for success. (present)"},{sentence:"उसने अपनी मेहनत से एक बड़ा व्यवसाय बनाया।",transliteration:"usne apnī mehnat se ek baṛā vyavasāy banāyā.",translation:"He built a big business through his hard work. (past)"}],id:"bulk_1780538039644_25"},{devanagari:"मेहनती",transliteration:"mehnती",meaning:"hardworking / industrious / laborious",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"वह एक मेहनती छात्र है।",transliteration:"vah ek mehnती chātr hai.",translation:"He is a hardworking student. (present)"},{sentence:"मेहनती लोग हमेशा सफल होते हैं।",transliteration:"mehnती log hameshā safal hote haiṁ.",translation:"Hardworking people are always successful. (present)"}],id:"bulk_1780538041595_26"},{devanagari:"मैला",transliteration:"mailā",meaning:"dirty / filthy / unclean / soiled",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"यह कपड़ा बहुत मैला है।",transliteration:"yah kaprā bahut mailā hai.",translation:"This cloth is very dirty. (present)"},{sentence:"बारिश के बाद सड़क मैली हो गई।",transliteration:"bāriś ke bād sāṛak mailī ho gaī.",translation:"After the rain, the road became dirty. (past)"}],id:"bulk_1780538043541_27"},{devanagari:"मोटा",transliteration:"moṭā",meaning:"fat / thick / stout / gross",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"वह मोटा आदमी है।",transliteration:"vah moṭā ādmī hai.",translation:"He is a fat man. (present)"},{sentence:"इस कपड़े का धागा बहुत मोटा है।",transliteration:"is kaprṛe kā dhāgā bahut moṭā hai.",translation:"The thread of this cloth is very thick. (present)"}],id:"bulk_1780538045488_28"},{devanagari:"मौसम",transliteration:"mausam",meaning:"season / weather",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"इस मौसम में बहुत गर्मी है।",transliteration:"is mausam mein bahut garmī hai.",translation:"It is very hot in this season. (present)"},{sentence:"सर्दियों का मौसम आ गया है।",transliteration:"sardiyom kā mausam ā gayā hai.",translation:"The winter season has arrived. (present perfect)"}],id:"bulk_1780538047229_29"},{devanagari:"यहाँ",transliteration:"yahāṁ",meaning:"here / in this place",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"यहाँ बहुत सुन्दर बाग है।",transliteration:"yahāṁ bahut sundar bāg hai.",translation:"There is a very beautiful garden here. (present)"},{sentence:"आप यहाँ बैठिए।",transliteration:"āp yahāṁ baiṭhie.",translation:"Please sit here. (imperative)"}],id:"bulk_1780538052753_30"},{devanagari:"यहीं",transliteration:"yahīṁ",meaning:"here / right here / at this place",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"मेरी किताब यहीं है।",transliteration:"merī kitāb yahīṁ hai.",translation:"My book is here. (present)"},{sentence:"तुम यहीं बैठो और प्रतीक्षा करो।",transliteration:"tum yahīṁ baiṭho aur pratīkṣā karo.",translation:"You sit here and wait. (imperative)"}],id:"bulk_1780538054700_31"},{devanagari:"यात्री",transliteration:"yātrī",meaning:"traveller / passenger / pilgrim",category:"noun",gender:"m/f",transitive:null,unit:null,examples:[{sentence:"ट्रेन में कई यात्री बैठे हैं।",transliteration:"ṭren mein kaī yātrī baiṭhe hain.",translation:"There are several passengers sitting in the train. (present)"},{sentence:"वह हिमालय की यात्रा करने वाला एक अनुभवी यात्री है।",transliteration:"vah himālay kī yātrā karne vālā ek anubhavī yātrī hai.",translation:"He is an experienced traveller who undertakes journeys to the Himalayas. (present)"}],id:"bulk_1780538057194_32"},{devanagari:"याद",transliteration:"yād",meaning:"memory / remembrance / recollection / to remember",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"मुझे बचपन की याद आ गई।",transliteration:"Mujhe bachpan kī yād ā gaī.",translation:"I remembered my childhood. (past)"},{sentence:"उसकी याद हमेशा मेरे साथ रहेगी।",transliteration:"Uskī yād hamēshā merē sāth rahegī.",translation:"His memory will always stay with me. (future)"}],id:"bulk_1780538059613_33"},{devanagari:"यानी",transliteration:"yānī",meaning:"that is / in other words / namely / i.e.",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"वह कल आएगा, यानी शुक्रवार को।",transliteration:"vah kal āegā, yānī śukvār ko.",translation:"He will come tomorrow, that is on Friday. (future)"},{sentence:"मुझे गणित पसंद है, यानी मैं संख्याओं से प्यार करता हूँ।",transliteration:"mujhe gaṇit pasand hai, yānī main sankhyāon se pyār kartā hūँ.",translation:"I like mathematics, in other words I love numbers. (present)"}],id:"bulk_1780538062165_34"},{devanagari:"रखना",transliteration:"rakhnā",meaning:"to keep / to place / to put / to maintain / to hold",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"मुझे अपनी किताब मेज पर रखनी है।",transliteration:"mujhe apnī kitāb mez par rakhnī hai.",translation:"I have to keep my book on the table. (present)"},{sentence:"वह हर दिन अपनी चाबी सुरक्षित जगह पर रखता है।",transliteration:"vah har din apnī chābī surakṣit jagah par rakhtā hai.",translation:"He keeps his key in a safe place every day. (present)"}],id:"bulk_1780538064472_35"},{devanagari:"रसोई",transliteration:"rasoi",meaning:"kitchen / cooking place",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"मेरी माँ रसोई में खाना बना रही है।",transliteration:"meri mã rasoi mẽ khana ba rahi hai.",translation:"My mother is cooking food in the kitchen. (present continuous)"},{sentence:"यह रसोई बहुत बड़ी और साफ है।",transliteration:"yah rasoi bahut badi aur saf hai.",translation:"This kitchen is very large and clean. (present)"}],id:"bulk_1780538066164_36"},{devanagari:"रहना",transliteration:"rahnā",meaning:"to live / to stay / to remain / to reside",category:"verb",gender:null,transitive:!1,unit:null,examples:[{sentence:"मैं दिल्ली में रहता हूँ।",transliteration:"maiṁ dillī mẽ rahtā hūँ.",translation:"I live in Delhi. (present)"},{sentence:"वह घर में रहे।",transliteration:"vah ghar mẽ rahe.",translation:"He stayed at home. (past)"}],id:"bulk_1780538068008_37"},{devanagari:"रास्ता",transliteration:"rāstā",meaning:"road / path / way / route",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"यह सड़क एक नया रास्ता है।",transliteration:"Yah sṛak ek nayā rāstā hai.",translation:"This road is a new path. (present)"},{sentence:"मुझे स्टेशन तक का रास्ता नहीं पता है।",transliteration:"Mujhe steshn tak kā rāstā nahī patā hai.",translation:"I don't know the way to the station. (present)"}],id:"bulk_1780538069953_38"},{devanagari:"रात",transliteration:"rāt",meaning:"night / nocturnal period",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"कल रात को मैं देर तक जागता रहा।",transliteration:"kal rāt ko maiṁ der tak jāgtā rahā.",translation:"Last night I stayed awake for a long time. (past)"},{sentence:"रात में तारे आसमान में चमकते हैं।",transliteration:"rāt meṁ tāre āsmān meṁ chamkte haiṁ.",translation:"Stars shine in the sky at night. (present)"}],id:"bulk_1780538072616_39"},{devanagari:"रात का खाना",transliteration:"rāt kā khānā",meaning:"dinner / supper / night meal",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"हम रात का खाना सात बजे खाते हैं।",transliteration:"ham rāt kā khānā sāt baje khāte hain.",translation:"We eat dinner at seven o'clock. (present)"},{sentence:"कल रात का खाना बहुत स्वादिष्ट था।",transliteration:"kal rāt kā khānā bahut svādiṣṭ thā.",translation:"Last night's dinner was very delicious. (past)"}],id:"bulk_1780538074561_40"},{devanagari:"रिश्तेदार",transliteration:"riśtedār",meaning:"relative / relation / kinsman",category:"noun",gender:"m/f",transitive:null,unit:null,examples:[{sentence:"मेरे सभी रिश्तेदार शादी में आएंगे।",transliteration:"mere sabhī riśtedār śādī meṁ āeṁge.",translation:"All my relatives will come to the wedding. (future)"},{sentence:"वह मेरा दूर का रिश्तेदार है।",transliteration:"vah merā dūr kā riśtedār hai.",translation:"He is a distant relative of mine. (present)"}],id:"bulk_1780538077276_41"},{devanagari:"रोज़",transliteration:"roz",meaning:"daily / every day / regularly",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"मैं रोज़ सुबह योग करता हूँ।",transliteration:"Main roz subah yog karta hoon.",translation:"I do yoga every morning. (present habitual)"},{sentence:"वह रोज़ अपने दोस्त से मिलता है।",transliteration:"Vah roz apne dost se milta hai.",translation:"He meets his friend daily. (present habitual)"}],id:"bulk_1780538078988_42"},{devanagari:"रोना",transliteration:"ronā",meaning:"to cry / to weep / to sob",category:"verb",gender:null,transitive:!1,unit:null,examples:[{sentence:"बच्चा जोर-जोर से रो रहा है।",transliteration:"bachchā jor-jor se ro rahā hai.",translation:"The child is crying loudly. (present continuous)"},{sentence:"फिल्म देखकर वह रो पड़ी।",transliteration:"film dekhkar vah ro padī.",translation:"She burst into tears after watching the movie. (past)"}],id:"bulk_1780538081317_43"},{devanagari:"लंबा",transliteration:"lambā",meaning:"long / tall / lengthy",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"यह रस्सी बहुत लंबी है।",transliteration:"yah rassī bahut lambī hai.",translation:"This rope is very long. (present)"},{sentence:"वह आदमी लंबा है।",transliteration:"vah ādam lambā hai.",translation:"That man is tall. (present)"}],id:"bulk_1780538083059_44"},{devanagari:"लगना",transliteration:"lagnā",meaning:"to be attached / to seem / to take / to cost / to be necessary / to strike / to apply",category:"verb",gender:null,transitive:!1,unit:null,examples:[{sentence:"मुझे यह किताब बहुत अच्छी लगती है।",transliteration:"Mujhe yah kitāb bahut achchi lagti hai.",translation:"I find this book very good. (present)"},{sentence:"उसे पढ़ाई में दो घंटे लग गए।",transliteration:"Use padhāi mein do ghanṭe lag gaye.",translation:"It took him two hours to study. (past)"}],id:"bulk_1780538085251_45"},{devanagari:"लड़का",transliteration:"laṛkā",meaning:"boy / son / young man",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"वह लड़का स्कूल जा रहा है।",transliteration:"vah laṛkā skūl jā rahā hai.",translation:"That boy is going to school. (present)"},{sentence:"मेरे पास एक छोटा लड़का है।",transliteration:"mere pās ek chōṭā laṛkā hai.",translation:"I have a small boy. (present)"}],id:"bulk_1780538087022_46"},{devanagari:"लड़की",transliteration:"laṛkī",meaning:"girl / daughter",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"वह लड़की बहुत होशियार है।",transliteration:"Vah laṛkī bahut hošiyār hai.",translation:"That girl is very intelligent. (present)"},{sentence:"इस लड़की का नाम प्रिया है।",transliteration:"Is laṛkī kā nām Priyā hai.",translation:"This girl's name is Priya. (present)"}],id:"bulk_1780538089272_47"},{devanagari:"लाइट",transliteration:"lāiṭ",meaning:"light (illumination) / light (not heavy) / electric light / lamp",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"कमरे में लाइट बंद कर दो।",transliteration:"kamare mẽ lāiṭ band kar do.",translation:"Turn off the light in the room. (imperative)"},{sentence:"यह लाइट बहुत उज्ज्वल है।",transliteration:"yah lāiṭ bahut ujjval hai.",translation:"This light is very bright. (present)"}],id:"bulk_1780538091112_48"},{devanagari:"लाना",transliteration:"lānā",meaning:"to bring / to fetch / to carry / to cause to come",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"कृपया मेरे लिए पानी लाना।",transliteration:"Kripayā mere lie pānī lānā.",translation:"Please bring water for me. (imperative)"},{sentence:"वह बाजार से सब्जियाँ लाया।",transliteration:"Vah bāzār se sabziyāñ layā.",translation:"He brought vegetables from the market. (past)"}],id:"bulk_1780538093402_49"},{devanagari:"लाल",transliteration:"lāl",meaning:"red / beloved (archaic)",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"यह लाल फूल बहुत सुंदर है।",transliteration:"yah lāl phūl bahut sundar hai.",translation:"This red flower is very beautiful. (present)"},{sentence:"उसने लाल रंग की साड़ी पहनी थी।",transliteration:"usne lāl rang kī sāṛī pahnī thī.",translation:"She wore a red-coloured saree. (past)"}],id:"bulk_1780538095345_50"},{devanagari:"लिखना",transliteration:"likhná",meaning:"to write / to draw / to compose",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"मैं हर दिन अपनी डायरी में लिखता हूँ।",transliteration:"Maiṁ har din apní dāyrī meṁ likhtá hūँ.",translation:"I write in my diary every day. (present habitual)"},{sentence:"उसने एक सुंदर पत्र लिखा।",transliteration:"Usne ek sundar patr likhá.",translation:"She wrote a beautiful letter. (past)"}],id:"bulk_1780538097393_51"},{devanagari:"लेकिन",transliteration:"lekin",meaning:"but / however / yet",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"वह बहुत अमीर है, लेकिन वह खुश नहीं है।",transliteration:"vah bahut amīr hai, lekin vah khush nahī̃ hai.",translation:"He is very rich, but he is not happy. (present)"},{sentence:"मैं आना चाहता था, लेकिन मेरे पास समय नहीं था।",transliteration:"maiṁ ānā chāhtā thā, lekin mere pās samay nahī̃ thā.",translation:"I wanted to come, but I didn't have time. (past)"}],id:"bulk_1780538100977_52"},{devanagari:"लेखक",transliteration:"lekhak",meaning:"writer / author",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"यह प्रसिद्ध लेखक है जिसने कई किताबें लिखी हैं।",transliteration:"yah prasiddh lekhak hai jisne kai kitaabein likhi hain.",translation:"He is a famous writer who has written many books. (present)"},{sentence:"उस लेखक की कहानियाँ बहुत रोचक हैं।",transliteration:"us lekhak ki kahaniyon bahut rochak hain.",translation:"That writer's stories are very interesting. (present)"}],id:"bulk_1780538103131_53"},{devanagari:"लेटना",transliteration:"leṭnā",meaning:"to lie down / to recline / to lie flat",category:"verb",gender:null,transitive:!1,unit:null,examples:[{sentence:"मैं रात को बिस्तर पर लेटता हूँ।",transliteration:"maiṁ rāt ko bistar par leṭtā hūँ.",translation:"I lie down on the bed at night. (present)"},{sentence:"वह पार्क में घास पर लेट गया।",transliteration:"vah pārk meṁ ghās par let gayā.",translation:"He lay down on the grass in the park. (past)"}],id:"bulk_1780538105278_54"},{devanagari:"लेता",transliteration:"letā",meaning:"takes / takes (habitual action) / would take",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"वह हर दिन बस लेता है।",transliteration:"vah har din bus letā hai.",translation:"He takes the bus every day. (present habitual)"},{sentence:"अगर मुझे मौका मिले तो मैं यह किताब लेता हूँ।",transliteration:"agar mujhe maukā mile to main yah kitāb letā hūँ.",translation:"If I get a chance, I would take this book. (conditional)"}],id:"bulk_1780538107428_55"},{devanagari:"लेना",transliteration:"lenā",meaning:"to take / to get / to receive / to accept / to carry",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"मुझे एक गिलास पानी लेना है।",transliteration:"mujhe ek gilās pānī lenā hai.",translation:"I need to take a glass of water. (present)"},{sentence:"उसने मेरी किताब ले ली।",transliteration:"usne merī kitāb le lī.",translation:"He took my book. (past)"}],id:"bulk_1780538109681_56"},{devanagari:"लोग",transliteration:"log",meaning:"people / persons / folk / crowd",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"बाजार में बहुत लोग हैं।",transliteration:"bāzār mẽ bahut log haiṁ.",translation:"There are many people in the market. (present)"},{sentence:"लोग अपने घर जा रहे हैं।",transliteration:"log apne ghar jā rahe haiṁ.",translation:"People are going to their homes. (present continuous)"}],id:"bulk_1780538111422_57"},{devanagari:"लौटना",transliteration:"lauṭnā",meaning:"to return / to come back / to give back / to refund",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"वह कल अपने घर लौटेगा।",transliteration:"vah kal apne ghar lauṭegā.",translation:"He will return to his home tomorrow. (future)"},{sentence:"मुझे वह किताब लौटानी है।",transliteration:"mujhe vah kitāb lauṭānī hai.",translation:"I have to return that book. (present)"}],id:"bulk_1780538113164_58"},{devanagari:"वगैरह",transliteration:"vagairah",meaning:"and so on / et cetera / and others / and the like",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"हमने किताबें, कॉपियाँ, पेन वगैरह खरीदे।",transliteration:"hamne kitāben, kāpiyān, pen vagairah kharīde.",translation:"We bought books, notebooks, pens and so on. (past)"},{sentence:"मेरे पास घर, गाड़ी, जमीन वगैरह हैं।",transliteration:"mere pās ghar, gāṛī, zamīn vagairah hain.",translation:"I have a house, a car, land and so forth. (present)"}],id:"bulk_1780538115620_59"},{devanagari:"वज़न",transliteration:"vazan",meaning:"weight / importance / gravity",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"मेरा वज़न पिछले महीने बढ़ गया है।",transliteration:"Merā vazan pichle mahīne baṛh gayā hai.",translation:"My weight has increased in the last month. (present perfect)"},{sentence:"इस बात का वज़न समझना ज़रूरी है।",transliteration:"Is bāt kā vazan samjhnā zarūrī hai.",translation:"It is important to understand the significance of this matter. (present)"}],id:"bulk_1780538119256_60"},{devanagari:"वहाँ",transliteration:"vahāṃ",meaning:"there / in that place / at that location",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"वहाँ एक बड़ा पेड़ है।",transliteration:"vahāṃ ek baṛā peṛ hai.",translation:"There is a big tree there. (present)"},{sentence:"मेरे दोस्त वहाँ रहते हैं।",transliteration:"mere dost vahāṃ rahte haiṃ.",translation:"My friends live there. (present)"}],id:"bulk_1780538121034_61"},{devanagari:"वापस",transliteration:"vāpas",meaning:"back / return / again",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"वह कल वापस घर आएगा।",transliteration:"vah kal vāpas ghar āegā.",translation:"He will return home tomorrow. (future)"},{sentence:"मुझे अपनी किताब वापस दे दो।",transliteration:"mujhe apnī kitāb vāpas de do.",translation:"Give me my book back. (imperative)"}],id:"bulk_1780538122876_62"},{devanagari:"वापस देना",transliteration:"vāpas denā",meaning:"to return / to give back / to restore",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"मुझे अपनी किताब वापस दे दो।",transliteration:"mujhe apnī kitāb vāpas de do.",translation:"Give me back my book. (imperative)"},{sentence:"उसने उधार लिया हुआ पैसा वापस दे दिया।",transliteration:"usne udhār liyā huā paisā vāpas de diyā.",translation:"He returned the borrowed money. (past)"}],id:"bulk_1780538125079_63"},{devanagari:"विदेश",transliteration:"videśa",meaning:"foreign country / abroad / foreign land",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"मेरा भाई विदेश में काम करता है।",transliteration:"merā bhāī videśa mẽ kām kartā hai.",translation:"My brother works abroad. (present)"},{sentence:"वह विदेश जाने के लिए वीसा के लिए आवेदन किया।",transliteration:"vah videśa jāne ke lie vīsā ke lie āvedan kiyā.",translation:"He applied for a visa to go to a foreign country. (past)"}],id:"bulk_1780538127294_64"},{devanagari:"विदेशी",transliteration:"videshī",meaning:"foreign / foreigner / foreign person",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"वह विदेशी देश से आया है।",transliteration:"Vah videshī desh se āyā hai.",translation:"He is from a foreign country. (present)"},{sentence:"इस होटल में बहुत सारे विदेशी पर्यटक हैं।",transliteration:"Is hotel mein bahut sāre videshī paryātak hain.",translation:"There are many foreign tourists in this hotel. (present)"}],id:"bulk_1780538129173_65"},{devanagari:"विद्यार्थी",transliteration:"vidyāarthī",meaning:"student / learner / pupil",category:"noun",gender:"m/f",transitive:null,unit:null,examples:[{sentence:"यह विद्यार्थी बहुत मेहनती है।",transliteration:"yah vidyāarthī bahut mehnatī hai.",translation:"This student is very hardworking. (present)"},{sentence:"विद्यार्थियों को पढ़ाई पर ध्यान देना चाहिए।",transliteration:"vidyāarthiyom ko padhāī par dhyān denā chāhie.",translation:"Students should pay attention to their studies. (present)"}],id:"bulk_1780538131390_66"},{devanagari:"शक्ति",transliteration:"śakti",meaning:"power / strength / energy / force / ability / capability",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"उसके पास बहुत शक्ति है।",transliteration:"Uske pās bahut śakti hai.",translation:"He/She has a lot of power. (present)"},{sentence:"हमें इस काम को करने की शक्ति चाहिए।",transliteration:"Hamen is kām ko karne ki śakti chāhie.",translation:"We need the strength to do this work. (present)"}],id:"bulk_1780538133958_67"},{devanagari:"शब्द",transliteration:"śabda",meaning:"word / sound / noise / tone",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"यह एक अच्छा शब्द है।",transliteration:"yah ek achhā śabda hai.",translation:"This is a good word. (present)"},{sentence:"मुझे इस शब्द का अर्थ नहीं पता।",transliteration:"mujhe is śabda kā arth nahī̃ patā.",translation:"I don't know the meaning of this word. (present)"}],id:"bulk_1780538135896_68"},{devanagari:"शब्दकोश",transliteration:"śabdakośa",meaning:"dictionary / lexicon / word-book",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"मुझे इस शब्द का अर्थ जानने के लिए शब्दकोश देखना पड़ा।",transliteration:"Mujhe is śabd kā arth jāne ke lie śabdakośa dekhna paṛ.",translation:"I had to consult the dictionary to know the meaning of this word. (past)"},{sentence:"यह एक बहुत अच्छा हिंदी शब्दकोश है।",transliteration:"Yah ek bahut achhā hindī śabdakośa hai.",translation:"This is a very good Hindi dictionary. (present)"}],id:"bulk_1780538137946_69"},{devanagari:"शराब",transliteration:"śarāb",meaning:"alcohol / alcoholic drink / liquor",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"वह हर रात शराब पीता है।",transliteration:"vah har rāt śarāb pītā hai.",translation:"He drinks alcohol every night. (present habitual)"},{sentence:"शराब का सेवन स्वास्थ्य के लिए हानिकारक है।",transliteration:"śarāb kā sevan svāsthya ke lie hānikārak hai.",translation:"The consumption of alcohol is harmful to health. (present)"}],id:"bulk_1780538139992_70"},{devanagari:"शरीर",transliteration:"śarīr",meaning:"body / physical form",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"मेरा शरीर बीमार है।",transliteration:"Merā śarīr bīmār hai.",translation:"My body is sick. (present)"},{sentence:"स्वस्थ शरीर के लिए व्यायाम जरूरी है।",transliteration:"Svasth śarīr ke lie vyāyām zarūrī hai.",translation:"Exercise is necessary for a healthy body. (present)"}],id:"bulk_1780538141629_71"},{devanagari:"शहर",transliteration:"śahar",meaning:"city / town / urban area",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"मैं हर दिन शहर जाता हूँ।",transliteration:"maiṁ har din śahar jātā hūँ.",translation:"I go to the city every day. (present)"},{sentence:"यह शहर बहुत बड़ा है।",transliteration:"yah śahar bahut baṛā hai.",translation:"This city is very large. (present)"}],id:"bulk_1780538143577_72"},{devanagari:"शांति",transliteration:"śānti",meaning:"peace / tranquility / calm / quietness",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"मुझे इस शांत जगह में शांति मिलती है।",transliteration:"mujhe is śānt jagah mein śānti miltī hai.",translation:"I find peace in this quiet place. (present)"},{sentence:"उन्होंने अपने मन की शांति के लिए ध्यान किया।",transliteration:"unhoṅne apne man kī śānti ke lie dhyān kiyā.",translation:"He meditated for the peace of his mind. (past)"}],id:"bulk_1780538150027_73"},{devanagari:"शादी",transliteration:"śādī",meaning:"marriage / wedding",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"मेरी शादी अगले महीने है।",transliteration:"merī śādī agle mahīne hai.",translation:"My wedding is next month. (present)"},{sentence:"उनकी शादी बहुत सुंदर थी।",transliteration:"unkī śādī bahut sundar thī.",translation:"Their wedding was very beautiful. (past)"}],id:"bulk_1780538151770_74"},{devanagari:"शादी करना",transliteration:"śādī karnā",meaning:"to marry / to get married / to perform a wedding",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"वह अगले साल शादी करने वाला है।",transliteration:"vah agle sāl śādī karne vālā hai.",translation:"He is going to get married next year. (near future)"},{sentence:"उन्होंने पिछले महीने शादी कर ली।",transliteration:"unhone pichle mahine śādī kar lī.",translation:"They got married last month. (past)"}],id:"bulk_1780538154841_75"},{devanagari:"शादी-शुदा",transliteration:"śādī-śudā",meaning:"married / wedded",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"वह एक शादी-शुदा आदमी है।",transliteration:"vah ek śādī-śudā ādmī hai.",translation:"He is a married man. (present)"},{sentence:"मेरी शादी-शुदा बहन कल आएगी।",transliteration:"merī śādī-śudā bahn kal āegī.",translation:"My married sister will come tomorrow. (future)"}],id:"bulk_1780538159140_76"},{devanagari:"शानदार",transliteration:"śāndār",meaning:"splendid / magnificent / wonderful / excellent / grand",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"यह एक शानदार फिल्म है।",transliteration:"yah ek śāndār film hai.",translation:"This is a splendid film. (present)"},{sentence:"उसने शानदार प्रदर्शन किया।",transliteration:"usne śāndār pradarshn kiyā.",translation:"He/She gave a magnificent performance. (past)"}],id:"bulk_1780538160984_77"},{devanagari:"शाबाश",transliteration:"śābāś",meaning:"well done / bravo / excellent / used as an exclamation of praise or approval",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"तुमने परीक्षा में शानदार अंक प्राप्त किए हैं, शाबाश!",transliteration:"tumne parīkṣā meṁ śāndar aṅk prāpt kie haiṁ, śābāś!",translation:"You got excellent marks in the exam, well done! (present)"},{sentence:"बच्चे ने अपने पिता की बात मान ली, शाबाश बेटा!",transliteration:"bacche ne apne pitā kī bāt māṇ lī, śābāś betā!",translation:"The child obeyed his father, bravo son! (past)"}],id:"bulk_1780538163851_78"},{devanagari:"शाम",transliteration:"śām",meaning:"evening / dusk / twilight",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"शाम को मैं पार्क में जाता हूँ।",transliteration:"śām ko maiṁ pārik meṁ jātā hūँ.",translation:"In the evening I go to the park. (present)"},{sentence:"कल शाम बहुत सुंदर थी।",transliteration:"kal śām bahut sundar thī.",translation:"Yesterday evening was very beautiful. (past)"}],id:"bulk_1780538165694_79"},{devanagari:"शायद",transliteration:"śāyad",meaning:"perhaps / maybe / possibly / probably",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"शायद वह कल आएगा।",transliteration:"śāyad vah kal āegā.",translation:"Perhaps he will come tomorrow. (future)"},{sentence:"शायद बारिश हो जाएगी।",transliteration:"śāyad bāriś ho jāegī.",translation:"It might rain. (future)"}],id:"bulk_1780538167319_80"},{devanagari:"शिकायत",transliteration:"śikāyat",meaning:"complaint / grievance / accusation",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"मुझे इस सेवा के बारे में एक शिकायत दर्ज करनी है।",transliteration:"Mujhe is sevā ke bāre meṁ ek śikāyat darj karnī hai.",translation:"I have to file a complaint about this service. (present)"},{sentence:"उसने पुलिस को अपनी शिकायत सुनाई।",transliteration:"Usne pulis ko apnī śikāyat sunāī.",translation:"He told his grievance to the police. (past)"}],id:"bulk_1780538169587_81"},{devanagari:"शुद्ध",transliteration:"śuddha",meaning:"pure / clean / correct / genuine / chaste",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"यह दूध बिल्कुल शुद्ध है।",transliteration:"Yah dūdh bilkul śuddha hai.",translation:"This milk is completely pure. (present)"},{sentence:"उसका हिंदी उच्चारण बहुत शुद्ध है।",transliteration:"Uska hindī uchhāraṇ bahut śuddha hai.",translation:"His Hindi pronunciation is very correct. (present)"}],id:"bulk_1780538171783_82"},{devanagari:"शुभ",transliteration:"śubh",meaning:"auspicious / good / favorable / propitious",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"आपके भविष्य के लिए शुभ कामनाएँ।",transliteration:"āpke bhavišya ke lie śubh kāmnāeṁ.",translation:"Best wishes for your future. (present)"},{sentence:"यह शुभ समाचार है कि आप परीक्षा में पास हो गए।",transliteration:"yah śubh samāchār hai ki āp parīkšā meṁ pās ho ge.",translation:"It is good news that you passed the exam. (present)"}],id:"bulk_1780538174173_83"},{devanagari:"शुभकामना",transliteration:"śubhkāmnā",meaning:"good wishes / blessing / well-wishes / auspicious desire",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"मैं आपको नए साल की शुभकामना देता हूँ।",transliteration:"mai āpko naye sāl ki śubhkāmnā detā hū̃.",translation:"I wish you good wishes for the new year. (present)"},{sentence:"उसकी सफलता के लिए सभी ने उसे शुभकामनाएं दीं।",transliteration:"uskī saflstā ke lie sabhī ne use śubhkāmnāẽ dī̃.",translation:"Everyone gave him their best wishes for his success. (past)"}],id:"bulk_1780538177370_84"},{devanagari:"शोला",transliteration:"śolā",meaning:"pith (of a plant) / spongy tissue used for making hats and ornaments",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"शोले से बने हुए हल्के टोपियाँ बहुत लोकप्रिय हैं।",transliteration:"śole se bane hue halke ṭopiyāñ bahut lokpriy haiñ.",translation:"Hats made from pith are very popular. (present)"},{sentence:"बच्चों के खिलौने शोले से तैयार किए जाते हैं।",transliteration:"bacchoñ ke khilone śole se tayyār kie jāte haiñ.",translation:"Children's toys are made from pith. (present passive)"}],id:"bulk_1780632187834_0"},{devanagari:"शौक़",transliteration:"śauq",meaning:"hobby / pastime / enthusiasm / keen interest / fancy",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"मुझे किताबें पढ़ने का बहुत शौक़ है।",transliteration:"mujhe kitāben paṛhne kā bahut śauq hai.",translation:"I have a great hobby of reading books. (present)"},{sentence:"उसका शौक़ फ़ोटोग्राफ़ी करना है।",transliteration:"uskā śauq fotogrāfī karnā hai.",translation:"His hobby is photography. (present)"}],id:"bulk_1780632190188_1"},{devanagari:"संगीत",transliteration:"saṅgīt",meaning:"music / melody / musical composition",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"मुझे संगीत सुनना बहुत पसंद है।",transliteration:"mujhe saṅgīt sunna bahut pasand hai.",translation:"I like listening to music very much. (present)"},{sentence:"वह संगीत की शिक्षा ले रहा है।",transliteration:"vah saṅgīt kī śikṣā le raha hai.",translation:"He is receiving music education. (present continuous)"}],id:"bulk_1780632192406_2"},{devanagari:"संगीतकार",transliteration:"saṅgītakār",meaning:"musician / composer",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"राज एक प्रसिद्ध संगीतकार है।",transliteration:"Rāj ek prasiddh saṅgītakār hai.",translation:"Raj is a famous musician. (present)"},{sentence:"उस संगीतकार ने एक सुंदर ग lk_1780632202509_7"},{devanagari:"सपना देखना",transliteration:"sapnā dekhnā",meaning:"to dream / to have a dream / to aspire",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"रात को मैंने एक अजीब सपना देखा।",transliteration:"rāt ko maiṁne ek ajīb sapnā dekhā.",translation:"I saw a strange dream last night. (past)"},{sentence:"वह हर रात सपने देखता है।",transliteration:"vah har rāt sapne dekhtā hai.",translation:"He dreams every night. (present)"}],id:"bulk_1780632204419_8"},{devanagari:"सब",transliteration:"sab",meaning:"all / everyone / everything / whole",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"सब लोग घर जा रहे हैं।",transliteration:"sab log ghar jā rahe haiṁ.",translation:"Everyone is going home. (present continuous)"},{sentence:"मैंने सब कुछ समझ लिया।",transliteration:"maiṁne sab kuch samjh liyā.",translation:"I understood everything. (past)"}],id:"bulk_1780632206368_9"},{devanagari:"सब कुछ",transliteration:"sab kuch",meaning:"everything / all things / anything",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"मुझे सब कुछ पता है।",transliteration:"Mujhe sab kuch patā hai.",translation:"I know everything. (present)"},{sentence:"उसने सब कुछ खो दिया।",transliteration:"Usne sab kuch kho diyā.",translation:"He lost everything. (past)"}],id:"bulk_1780632207888_10"},{devanagari:"सबसे",transliteration:"sabse",meaning:"most / from all / among all",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"यह सबसे अच्छी किताब है।",transliteration:"yah sabse achhī kitāb hai.",translation:"This is the best book. (present)"},{sentence:"वह सबसे तेज़ दौड़ता है।",transliteration:"vah sabse tez daudtā hai.",translation:"He runs the fastest among all. (present)"}],id:"bulk_1780632209647_11"},{devanagari:"सब्जी",transliteration:"sabzī",meaning:"vegetable / greens",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"मैं बाजार से ताजी सब्जी लाया हूँ।",translit thority",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"भारतीय सरकार ने नई नीति घोषित की है।",transliteration:"bhāratīy sarkār ne naī nītī ghoshit kī hai.",translation:"The Indian government has announced a new policy. (present perfect)"},{sentence:"सरकार जनता की सेवा के लिए काम करती है।",transliteration:"sarkār jantā kī sevā ke lie kām kartī hai.",translation:"The government works for the service of the people. (present)"}],id:"bulk_1780632220966_16"},{devanagari:"सलाह",transliteration:"salāh",meaning:"advice / counsel / suggestion",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"मुझे अपने पिता की सलाह माननी चाहिए।",transliteration:"Mujhe apne pitā kī salāh mānnī chāhie.",translation:"I should follow my father's advice. (present)"},{sentence:"उसने मुझे एक अच्छी सलाह दी।",transliteration:"Usne mujhe ek achhī salāh dī.",translation:"He/She gave me good advice. (past)"}],id:"bulk_1780632223712_17"},{devanagari:"सवारी",transliteration:"savārī",meaning:"ride / passenger / mounted procession / carriage / vehicle",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"बच्चों को घोड़े पर सवारी करना बहुत पसंद है।",transliteration:"Bachchon ko ghode par savārī karnā bahut pasand hai.",translation:"Children like riding on horses very much. (present)"},{sentence:"राजा की भव्य सवारी शहर से निकली।",transliteration:"Rājā kī bhavya savārī shahar se niklī.",translation:"The king's grand procession passed through the city. (past)"}],id:"bulk_1780632226132_18"},{devanagari:"सस्ता",transliteration:"sastā",meaning:"cheap / inexpensive / affordable",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"यह कमीज बहुत सस्ती है।",transliteration:"yah kamīz bahut sastī hai.",translation:"This shirt is very cheap. (present)"},{sentence:"बाजार में सस्ते फल मिल गए।",transliteration:"bāzār mẽ saste phal mil gae.",translation:"Cheap fruits were found in the market. (past)"}],id:"bulk_1780632228107_19"},{devanagari:"सहायता",transliteration:"sahāytā",meaning:"help / assistance / support / aid",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"मुझे इस काम में सहायता की आवश्यकता है।",transliteration:"Mujhe is kām mein sahāytā ki āvashyaktā hai.",translation:"I need help with this work. (present)"},{sentence:"उन्होंने गरीब लोगों को सहायता प्रदान की।",transliteration:"Unhonein gareeb logon ko sahāytā pradān ki.",translation:"They provided assistance to poor people. (past)"}],id:"bulk_1780632230217_20"},{devanagari:"सहित",transliteration:"sahita",meaning:"along with / together with / including / accompanied by",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"वह अपने परिवार सहित घर आया।",transliteration:"vah apne parivār sahit ghar āyā.",translation:"He came home along with his family. (past)"},{sentence:"सभी कर्मचारी सहित प्रबंधक मीटिंग में शामिल हुए।",transliteration:"sabhī karmchārī sahit prbandhak mīṭiṅg mẽ śāmil hue.",translation:"The manager along with all employees participated in the meeting. (past)"}],id:"bulk_1780632233057_21"},{devanagari:"सही",transliteration:"sahī",meaning:"correct / right / true / proper / exact",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"आपका उत्तर बिल्कुल सही है।",transliteration:"āpkā uttar bilkul sahī hai.",translation:"Your answer is absolutely correct. (present)"},{sentence:"यह सही समय है उसे बताने का।",transliteration:"yah sahī samay hai use batāne kā.",translation:"This is the right time to tell him. (present)"}],id:"bulk_1780632235451_22"},{devanagari:"सहेली",transliteration:"sahelī",meaning:"female friend / companion / girlfriend",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"मेरी सहेली मेरे साथ स्कूल जाती है।",transliteration:"Merī sahelī mere sāth skūl jātī hai.",translation:"My female friend goes to school with me. (present)"},{sentence:"वह अपनी सहेली से बहुत प्यार करती है।",transliteration:"Vah apnī sahelī se bahut pyār kartī hai.",translation:"She loves her friend very much. (present)"}],id:"bulk_1780632237395_23"},{devanagari:"-सा",transliteration:"-sā",meaning:"resembling / like / similar to / somewhat / -ish (suffix forming adjectives denoting similarity or approximation)",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"उसका चेहरा बिल्कुल पिता जैसा दिखता है।",transliteration:"uskā chehrā bilkul pitā jaisā dikhtā hai.",translation:"His face looks exactly like his father's. (present)"},{sentence:"यह पुस्तक कुछ इतिहास-सा लगता है।",transliteration:"yah pustak kuch itihas-sā lagta hai.",translation:"This book seems somewhat like history / has a history-like quality. (present)"}],id:"bulk_1780632239751_24"},{devanagari:"साइकिल",transliteration:"sāikil",meaning:"bicycle / cycle",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"मेरी साइकिल बहुत पुरानी है।",transliteration:"merī sāikil bahut purānī hai.",translation:"My bicycle is very old. (present)"},{sentence:"वह हर दिन साइकिल से स्कूल जाता है।",transliteration:"vah har din sāikil se skūl jātā hai.",translation:"He goes to school by bicycle every day. (present habitual)"}],id:"bulk_1780632241528_25"},{devanagari:"सादर",transliteration:"sādar",meaning:"respectfully / with respect / courteously / formally",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"मैं आपको सादर निमंत्रण दे रहा हूँ।",transliteration:"main āpko sādar nimantran de rahā hūँ.",translation:"I am extending a respectful invitation to you. (present)"},{sentence:"वह सादर प्रणाम करके आगे बढ़ गया।",transliteration:"vah sādar pranām karke āge baṛh gayā.",translation:"He moved forward with a respectful salute. (past)"}],id:"bulk_1780632244052_26"},{devanagari:"साफ़",transliteration:"sāf",meaning:"clean / clear / pure / obvious",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"यह कमरा बहुत साफ़ है।",transliteration:"Yah kamrā bahut sāf hai.",translation:"This room is very clean. (present)"},{sentence:"आकाश बिल्कुल साफ़ दिख रहा है।",transliteration:"Ākāsh bilkul sāf dikh rahā hai.",translation:"The sky is looking completely clear. (present)"}],id:"bulk_1780632245970_27"},{devanagari:"साफ़ करना",transliteration:"sāf karnā",meaning:"to clean / to clear / to tidy up",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"मैं हर दिन अपने कमरे को साफ़ करता हूँ।",transliteration:"Main har din apne kamre ko sāf kartā hūn.",translation:"I clean my room every day. (present)"},{sentence:"उसने पूरे घर को साफ़ कर दिया।",transliteration:"Usne pure ghar ko sāf kar diyā.",translation:"He/She cleaned the entire house. (past)"}],id:"bulk_1780632251059_28"},{devanagari:"साबुन",transliteration:"sābun",meaning:"soap",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"मुझे नहाने के लिए साबुन चाहिए।",transliteration:"mujhe nahāne ke lie sābun chāhie.",translation:"I need soap to bathe. (present)"},{sentence:"यह साबुन बहुत अच्छा है और त्वचा को नरम रखता है।",transliteration:"yah sābun bahut achhā hai aur tvachā ko narm rakhtā hai.",translation:"This soap is very good and keeps the skin soft. (present)"}],id:"bulk_1780632253709_29"},{devanagari:"सामने",transliteration:"sāmne",meaning:"in front of / opposite / before / facing",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"वह मेरे सामने बैठा है।",transliteration:"vah mere sāmne baiṭhā hai.",translation:"He is sitting in front of me. (present)"},{sentence:"स्कूल घर के सामने है।",transliteration:"skūl ghar ke sāmne hai.",translation:"The school is opposite the house. (present)"}],id:"bulk_1780632255527_30"},{devanagari:"सामान",transliteration:"sāmān",meaning:"goods / merchandise / luggage / baggage / stuff / belongings",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"मेरे पास बहुत सामान है।",transliteration:"mere pās bahut sāmān hai.",translation:"I have a lot of luggage. (present)"},{sentence:"दुकान में कपड़ों का other teaches me to cook. (present)"},{sentence:"शिक्षक ने विद्यार्थियों को गणित सिखाया।",transliteration:"śikṣak ne vidyārthiyõ ko gaṇit sikhāyā.",translation:"The teacher taught the students mathematics. (past)"}],id:"bulk_1780632270258_35"},{devanagari:"सितार",transliteration:"sitār",meaning:"sitar (a plucked stringed musical instrument) / sitar player",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"राज का भाई बहुत सुंदर सितार बजाता है।",transliteration:"Rāj kā bhāī bahut sundar sitār bajātā hai.",translation:"Raj's brother plays the sitar very beautifully. (present)"},{sentence:"उस संगीत समारोह में एक प्रसिद्ध सितार वादक ने प्रदर्शन किया।",transliteration:"Us sangīt samāroh mein ek prasiddh sitār vādak ne pradarshn kiyā.",translation:"A famous sitar player performed at that music concert. (past)"}],id:"bulk_1780632272811_36"},{devanagari:"सिर्फ़",transliteration:"sirf",meaning:"only / just / merely / solely",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"मैं सिर्फ़ पानी पीना चाहता हूँ।",transliteration:"Main sirf pani pina chahta hoon.",translation:"I only want to drink water. (present)"},{sentence:"यह सिर्फ़ एक सपना था।",transliteration:"Yah sirf ek sapna tha.",translation:"It was merely a dream. (past)"}],id:"bulk_1780632274567_37"},{devanagari:"सिलवाना",transliteration:"silvānā",meaning:"to have something sewn / to get stitching done",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"मैंने दर्जी से कुर्ता सिलवाया।",transliteration:"maiṁne darjī se kurtā silvāyā.",translation:"I had a kurta sewn by the tailor. (past)"},{sentence:"वह अपनी बेटी के लिए कपड़े सिलवा रही है।",transliteration:"vah apnī beṭī ke lie kaprṛe silvā rahī hai.",translation:"She is getting clothes sewn for her daughter. (present)"}],id:"bulk_1780632277947_38"},{devanagari:"सीना",transliteration:"sīnā",meaning:"chest / breast / bosom / courage / to stitch",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"उसके सीने में बहुत साहस है।",transliteration:"uske sīne mẽ bahut sāhas hai.",translation:"He has a lot of courage in his chest. (present)"},{sentence:"दर्जी ने कुर्ते का सीना सिल दिया।",transliteration:"darjī ne kurte kā sīnā sil diyā.",translation:"The tailor stitched the front of the shirt. (past)"}],id:"bulk_1780632280396_39"},{devanagari:"सुखी",transliteration:"sukhī",meaning:"happy / contented / comfortable",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"वह एक सुखी जीवन जी रहा है।",transliteration:"vah ek sukhī jīvan jī rahā hai.",translation:"He is living a happy life. (present)"},{sentence:"सुखी रहो और सुखी रखो।",transliteration:"sukhī raho aur sukhī rakho.",translation:"Be happy and keep others happy. (imperative)"}],id:"bulk_1780632282551_40"},{devanagari:"सीखना",transliteration:"sīkhnā",meaning:"to learn / to acquire knowledge or skill",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"मैं स्कूल में हिंदी सीख रहा हूँ।",transliteration:"maiṁ skūl meṁ hindī sīkh rahā hūँ.",translation:"I am learning Hindi at school. (present continuous)"},{sentence:"उसने पिछले साल अंग्रेजी सीखी।",transliteration:"usnē pichlē sāl aṅgrezī sīkhī.",translation:"She learned English last year. (past)"}],id:"bulk_1780632284908_41"},{devanagari:"सुंदर",transliteration:"sundar",meaning:"beautiful / handsome / lovely / attractive",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"यह सुंदर फूल बगीचे में खिल रहा है।",transliteration:"Yah sundar phūl bagīche mein khil rahā hai.",translation:"This beautiful flower is blooming in the garden. (present)"},{sentence:"वह एक सुंदर महिला है।",transliteration:"Vah ek sundar mahilā hai.",translation:"She is a beautiful woman. (present)"}],id:"bulk_1780632286751_42"},{devanagari:"सुनना",transliteration:"sunnā",meaning:"to hear / to listen",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"मैं संगीत सुनना पसंद करता हूँ।",transliteration:"maiṁ saṅgīt sunnā pasand kartā hū̃.",translation:"I like to listen to music. (present habitual)"},{sentence:"क्या तुमने यह खबर सुनी?",transliteration:"kyā tumne yah khabar sunī?",translation:"Did you hear this news? (past)"}],id:"bulk_1780632291668_43"},{devanagari:"सुनसान",transliteration:"sunsān",meaning:"deserted / empty / desolate / lonely",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"रात के समय सड़कें बिल्कुल सुनसान हो जाती हैं।",transliteration:"Rāt ke samay sṛ̣kẽ bilkul sunsān ho jātī haiṃ.",translation:"The streets become completely deserted during the night. (present)"},{sentence:"कोविड लॉकडाउन के दौरान शहर एकदम सुनसान था।",transliteration:"Kovīḍ lākaḍaun ke daurān śahr ekdam sunsān thā.",translation:"The city was completely desolate during the COVID lockdown. (past)"}],id:"bulk_1780632294525_44"},{devanagari:"सुबह",transliteration:"subah",meaning:"morning / dawn / early part of the day",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"मैं हर सुबह जल्दी उठता हूँ।",transliteration:"main har subah jaldi uthta hūn.",translation:"I wake up early every morning. (present)"},{sentence:"सुबह की धूप बहुत अच्छी होती है।",transliteration:"subah kī dhūp bahut achhī hotī hai.",translation:"The morning sunlight is very pleasant. (present)"}],id:"bulk_1780632297403_45"},{devanagari:"से",transliteration:"se",meaning:"from / by / with / through / since / than",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"मैं घर से स्कूल जाता हूँ।",transliteration:"maiṁ ghar se skūl jātā hūँ.",translation:"I go from home to school. (present habitual)"},{sentence:"यह किताब मेरे दोस्त से मिली।",transliteration:"yah kitāb mere dost se milī.",translation:"I received this book from my friend. (past)"}],id:"bulk_1780632299451_46"},{devanagari:"सैर",transliteration:"sair",meaning:"walk / stroll / excursion / tour",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"हर शाम को मैं पार्क में सैर करता हूँ।",transliteration:"har śām ko maiṁ pāark meṁ sair kartā hūँ.",translation:"Every evening I take a walk in the park. (present)"},{sentence:"बच्चों को सैर पर ले जाना बहुत अच्छा है।",transliteration:"bachchoṁ ko sair par le jānā bahut achhā hai.",translation:"Taking children on an excursion is very good. (present)"}],id:"bulk_1780632301686_47"},{devanagari:"सूचना",transliteration:"sūcnā",meaning:"information / notice / announcement / notification",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"मुझे इस बारे में कोई सूचना नहीं मिली।",transliteration:"Mujhe is bāre mein koī sūcnā nahī̃ milī.",translation:"I didn't receive any information about this. (past)"},{sentence:"सरकार ने सभी नागरिकों को सूचना दी है।",transliteration:"Sarkār ne sabhī nāgarīkon ko sūcnā dī hai.",translation:"The government has given notice to all citizens. (present perfect)"}],id:"bulk_1780632304469_48"},{devanagari:"सोना",transliteration:"sonā",meaning:"gold / to sleep",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"उसके पास बहुत सोना है।",transliteration:"uske pās bahut sonā hai.",translation:"He has a lot of gold. (present)"},{sentence:"मेरी अंगूठी सोने की बनी है।",transliteration:"merī angūṭhī sone kī banī hai.",translation:"My ring is made of gold. (present)"}],id:"bulk_1780632306516_49"},{devanagari:"हँसना",transliteration:"hãsnā",meaning:"to laugh / to smile",category:"verb",gender:null,transitive:!1,unit:null,examples:[{sentence:"बच्चे को मजाकिया कहानी सुनकर बहुत हँसना आया।",transliteration:"Bacche ko majākīyā kahānī sunkar bahut hãsnā āyā.",translation:"The child laughed a lot after hearing the funny story. (past)"},{sentence:"वह रोज़ सुबह अपने दोस्तों के साथ हँसता है।",transliteration:"Vah roz subah apne dostõ ke sāth hãstā hai.",translation:"He laughs with his friends every morning. (present)"}],id:"bulk_1780632308973_50"},{devanagari:"हफ़्ता",transliteration:"haftā",meaning:"week / a period of seven days",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"मैं अगले हफ़्ते अपने दोस्त से मिलूंगा।",transliteration:"maiṁ agle haftē apne dost se miluṁgā.",translation:"I will meet my friend next week. (future)"},{sentence:"इस हफ़्ते बहुत ठंड है।",transliteration:"is haftē bahut ṭhaṁd hai.",translation:"It is very cold this week. (present)"}],id:"bulk_1780632311053_51"},{devanagari:"हमेशा",transliteration:"hamēśā",meaning:"always / forever / ever",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"मैं हमेशा सच बोलता हूँ।",transliteration:"Main hamēśā sach boltā hūँ.",translation:"I always speak the truth. (present habitual)"},{sentence:"वह हमेशा अपनी किताबें अपने साथ रखता है।",transliteration:"Vah hamēśā apnī kitābēn apnē sāth rakhtā hai.",translation:"He always keeps his books with him. (present habitual)"}],id:"bulk_1780632314093_52"},{devanagari:"हर",transliteration:"har",meaning:"every / each / all / to steal (verb) / green (poetic)",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"हर दिन सुबह मैं योग करता हूँ।",transliteration:"har din subah main yog karta hūn.",translation:"I do yoga every morning. (present)"},{sentence:"हर किसी को अपने सपने पूरे करने का अधिकार है।",transliteration:"har kisi ko apne sapne pūre karne ka adhikar hai.",translation:"Everyone has the right to fulfill their dreams. (present)"}],id:"bulk_1780632316134_53"},{devanagari:"हवा",transliteration:"havā",meaning:"air / wind / breeze",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"बाहर ठंडी हवा चल रही है।",transliteration:"bāhar ṭhaṇḍī havā chal rahī hai.",translation:"A cold breeze is blowing outside. (present)"},{sentence:"खिड़की खोलो, ताजी हवा आने दो।",transliteration:"khiḍkī kholo, tāzī havā āne do.",translation:"Open the window, let fresh air come in. (imperative)"}],id:"bulk_1780632318291_54"},{devanagari:"हाँ",transliteration:"hā̃",meaning:"yes / okay / agreed",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"क्या तुम कल आ सकते हो? हाँ, मैं आऊँगा।",transliteration:"Kyā tum kal ā sakte ho? Hā̃, maiṃ āū̃gā.",translation:"Can you come tomorrow? Yes, I will come. (present/future)"},{sentence:"हाँ, यह बिल्कुल सही है।",transliteration:"Hā̃, yah bilkul sahi hai.",translation:"Yes, that is absolutely correct. (present)"}],id:"bulk_1780632320544_55"},{devanagari:"हाथ",transliteration:"hāth",meaning:"hand / arm / control / possession / side",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"उसने अपना हाथ ऊपर उठाया।",transliteration:"usne apnā hāth ūpar uthāyā.",translation:"He raised his hand up. (past)"},{sentence:"यह काम मेरे हाथ में है।",transliteration:"yah kām mere hāth mẽ hai.",translation:"This work is in my hands / under my control. (present)"}],id:"bulk_1780632322531_56"},{devanagari:"हाथी",transliteration:"hāthī",meaning:"elephant",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"बड़ा हाथी जंगल में रहता है।",transliteration:"Baṛā hāthī jangal mẽ rahtā hai.",translation:"The big elephant lives in the forest. (present)"},{sentence:"बच्चों को चिड़ियाघर में हाथी देखना पसंद है।",transliteration:"Bachchõ ko chṛiyāghar mẽ hāthī dekhnā pasand hai.",translation:"Children like to see the elephant at the zoo. (present)"}],id:"bulk_1780632324538_57"},{devanagari:"हाल",transliteration:"hāl",meaning:"condition / state / situation / present time / news / plight",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"तुम्हारा हाल कैसा है?",transliteration:"tumhāra hāl kaisā hai?",translation:"How are you? / What is your condition? (present)"},{sentence:"देश का आर्थिक हाल बहुत गंभीर है।",transliteration:"deś kā ārtik hāl bahut gambhīr hai.",translation:"The economic condition of the country is very serious. (present)"}],id:"bulk_1780632326586_58"},{devanagari:"हिलाना",transliteration:"hilānā",meaning:"to shake / to move / to stir / to rock",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"मां ने बच्चे को सुलाने के लिए पालना हिलाया।",transliteration:"Mā ne bacche ko sulāne ke lie pālnā hilāyā.",translation:"The mother rocked the cradle to put the child to sleep. (past)"},{sentence:"हवा के झोंकों से पेड़ की शाखाएं हिल रही हैं।",transliteration:"Hawā ke jhonkon se ped kī śākhāen hil rahī hain.",translation:"The tree's branches are swaying in the gusts of wind. (present continuous)"}],id:"bulk_1780632329043_59"},{devanagari:"ही",transliteration:"hī",meaning:"only / just / merely / itself (emphatic particle)",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"वह ही सबसे अच्छा विद्यार्थी है।",transliteration:"vah hī sabse achhā vidyārthi hai.",translation:"He is the best student (only he is). (present)"},{sentence:"मैं ही तुम्हारे लिए यह काम कर दूँगा।",transliteration:"maiṁ hī tumhāre lie yah kām kar dūṁgā.",translation:"I myself will do this work for you. (future)"}],id:"bulk_1780632331236_60"},{devanagari:"हीरा",transliteration:"hīrā",meaning:"diamond / gem",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"उसके हाथ में एक बड़ा हीरा था।",transliteration:"uske hāth mein ek bṛā hīrā thā.",translation:"He had a large diamond in his hand. (past)"},{sentence:"यह हीरा बहुत कीमती है।",transliteration:"yah hīrā bahut kīmtī hai.",translation:"This diamond is very precious. (present)"}],id:"bulk_1780632333241_61"},{devanagari:"होना",transliteration:"honā",meaning:"to be / to exist / to happen / to occur",category:"verb",gender:null,transitive:!1,unit:null,examples:[{sentence:"वह एक शिक्षक है।",transliteration:"vah ek śikṣak hai.",translation:"He is a teacher. (present)"},{sentence:"कल बारिश हुई थी।",transliteration:"kal bāriś huī thī.",translation:"It rained yesterday. (past)"}],id:"bulk_1780632334983_62"},{devanagari:"हो जाना",transliteration:"ho jānā",meaning:"to become / to happen / to turn into / to be completed",category:"verb",gender:null,transitive:!1,unit:null,examples:[{sentence:"वह डॉक्ट
