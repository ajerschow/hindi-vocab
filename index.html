ve:null,unit:null,examples:[{sentence:"उसकी ठुड्डी बहुत तीक्ष्ण है।",transliteration:"uskī ṭhuddī bahut tīkṣṇ hai.",translation:"His/Her chin is very sharp. (present)"},{sentence:"बच्चे ने अपनी ठुड्डी पर चोट लगाई।",transliteration:"bacche ne apnī ṭhuddī par chot lagāī.",translation:"The child injured his/her chin. (past)"}],id:"bulk_1780139418928_57"},{devanagari:"डाक",transliteration:"ḍāk",meaning:"mail / post / postal system",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"मुझे कल डाक मिली।",transliteration:"Mujhe kal ḍāk milī.",translation:"I received mail yesterday. (past)"},{sentence:"डाकघर सुबह नौ बजे खुलता है।",transliteration:"Ḍākghar subah nau baje khultā hai.",translation:"The post office opens at nine in the morning. (present)"}],id:"bulk_1780139420841_58"},{devanagari:"डाक घर",transliteration:"ḍāk ghar",meaning:"post office / mail house",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"मुझे डाक घर जाना है पत्र भेजने के लिए।",transliteration:"Mujhe ḍāk ghar jānā hai patra bhejne ke liye.",translation:"I have to go to the post office to send a letter. (present)"},{sentence:"डाक घर सोमवार से शुक्रवार तक खुला रहता है।",transliteration:"Ḍāk ghar somvār se śukrvār tak khulā rahtā hai.",translation:"The post office remains open from Monday to Friday. (present)"}],id:"bulk_1780139423123_59"},{devanagari:"डाक की टिकट",transliteration:"ḍāk kī ṭikaṭ",meaning:"postage stamp / mail stamp",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"मुझे एक डाक की टिकट खरीदनी है।",transliteration:"Mujhe ek ḍāk kī ṭikaṭ kharīdnī hai.",translation:"I need to buy a postage stamp. (present)"},{sentence:"उसने पत्र पर डाक की टिकट लगाई।",transliteration:"Usne patr par ḍāk kī ṭikaṭ lagāī.",translation:"He/She stuck a postage stamp on the letter. (past)"}],id:"bulk_1780139425176_60"},{devanagari:"डालना",transliteration:"ḍālnā",meaning:"to put / to place / to pour / to insert / to throw / to stake / to invest",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"वह पानी गिलास में डालता है।",transliteration:"vah pānī gilās meṁ ḍāltā hai.",translation:"He pours water into the glass. (present)"},{sentence:"मैंने किताब मेज पर डाल दी।",transliteration:"maiṁne kitāb mez par ḍāl dī.",translation:"I placed the book on the table. (past)"}],id:"bulk_1780139427530_61"},{devanagari:"डिब्बा",transliteration:"ḍibbā",meaning:"box / tin / container / compartment (of a train)",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"मुझे चाय का डिब्बा दे दो।",transliteration:"mujhe chāy kā ḍibbā de do.",translation:"Give me the tea tin. (imperative)"},{sentence:"ट्रेन के डिब्बे में बहुत भीड़ थी।",transliteration:"ṭren ke ḍibbe meṁ bahut bhīṛ thī.",translation:"There was a lot of crowd in the train compartment. (past)"}],id:"bulk_1780139430090_62"},{devanagari:"ढाबा",transliteration:"ḍhābā",meaning:"roadside restaurant / small eating establishment / diner",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"हम सड़क के किनारे एक ढाबे में खाना खाते हैं।",transliteration:"Ham sāṛak ke kināre ek ḍhābe mein khānā khāte hain.",translation:"We eat food at a roadside dhaba. (present)"},{sentence:"उस ढाबे का मालिक बहुत मित्रवत है।",transliteration:"Us ḍhābe kā mālik bahut mitrvat hai.",translation:"The owner of that dhaba is very friendly. (present)"}],id:"bulk_1780139432650_63"},{devanagari:"तंग",transliteration:"taṅg",meaning:"tight / narrow / cramped / annoyed / troubled",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"यह कमरा बहुत तंग है।",transliteration:"yah kamrā bahut taṅg hai.",translation:"This room is very narrow/cramped. (present)"},{sentence:"मेरे पिता जी मुझसे तंग हो गए हैं।",transliteration:"mere pitā jī mujhse taṅg ho gaye haiṅ.",translation:"My father has become annoyed/troubled with me. (present perfect)"}],id:"bulk_1780139435209_64"},{devanagari:"तंग करना",transliteration:"taṅg karnā",meaning:"to tease / to annoy / to harass / to trouble / to make tight",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"वह बच्चों को तंग करता है।",transliteration:"vah bachchoṁ ko taṅg kartā hai.",translation:"He teases the children. (present)"},{sentence:"मेरे भाई ने मुझे बहुत तंग किया।",transliteration:"mere bhāī ne mujhe bahut taṅg kiyā.",translation:"My brother annoyed me a lot. (past)"}],id:"bulk_1780139437360_65"},{devanagari:"तक",transliteration:"tak",meaning:"until / up to / till / as far as / to the extent that / even",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"मैं सोमवार तक यहाँ रहूँगा।",transliteration:"Main somvār tak yahāñ rahūngā.",translation:"I will stay here until Monday. (future)"},{sentence:"वह रात भर तक पढ़ता रहा।",transliteration:"Vah rāt bhar tak paṛhtā rahā.",translation:"He kept reading throughout the night. (past)"}],id:"bulk_1780139439615_66"},{devanagari:"तकलीफ़",transliteration:"taklīf",meaning:"trouble / difficulty / hardship / pain / suffering / inconvenience",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"मुझे इस काम में बहुत तकलीफ़ हुई।",transliteration:"Mujhe is kām meṁ bahut taklīf hui.",translation:"I faced a lot of difficulty in this work. (past)"},{sentence:"क्या आपको कोई तकलीफ़ है?",transliteration:"Kyā āpko koī taklīf hai?",translation:"Are you in any pain/trouble? (present)"}],id:"bulk_1780139441911_67"},{devanagari:"तनख़्वाह",transliteration:"tanḵhwāh",meaning:"salary / wages / pay",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"मेरी तनख़्वाह हर महीने बैंक में जमा हो जाती है।",transliteration:"merī tanḵhwāh har mahīne baiṅk meṁ jamā ho jātī hai.",translation:"My salary is deposited in the bank every month. (present)"},{sentence:"उसे एक अच्छी तनख़्वाह के साथ नई नौकरी मिल गई।",transliteration:"use ek achhī tanḵhwāh ke sāth naī naukarī mil gaī.",translation:"He got a new job with a good salary. (past)"}],id:"bulk_1780139445041_68"},{devanagari:"तनख़ाह",transliteration:"tankhāh",meaning:"salary / wages / stipend",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"मेरी मासिक तनख़ाह दस हज़ार रुपये है।",transliteration:"merī māsik tankhāh das hazār rupaye hai.",translation:"My monthly salary is ten thousand rupees. (present)"},{sentence:"उसे कंपनी से अच्छी तनख़ाह मिलती है।",transliteration:"use kampnī se achhī tankhāh miltī hai.",translation:"He receives a good salary from the company. (present habitual)"}],id:"bulk_1780139446986_69"},{devanagari:"तब",transliteration:"tab",meaning:"then / at that time / in that case",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"जब वह आया, तब मैं घर पर नहीं था।",transliteration:"jab vah āyā, tab maiṁ ghar par nahīṁ thā.",translation:"When he came, I was not at home. (past)"},{sentence:"तब तुम बहुत छोटे थे।",transliteration:"tab tum bahut chote the.",translation:"You were very small at that time. (past)"}],id:"bulk_1780139448932_70"},{devanagari:"तबला",transliteration:"tablā",meaning:"tabla (a pair of hand drums used in Indian classical music)",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"वह हर रोज़ तबला बजाता है।",transliteration:"vah har roz tablā bajātā hai.",translation:"He plays the tabla every day. (present)"},{sentence:"संगीत समारोह में तबला की आवाज़ बहुत सुंदर थी।",transliteration:"sangīt samāroah mẽ tablā kī āvāz bahut sundar thī.",translation:"The sound of the tabla was very beautiful at the music concert. (past)"}],id:"bulk_1780139451083_71"},{devanagari:"तबियत",transliteration:"tabiyat",meaning:"health / physical condition / mood / temperament / disposition",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"आजकल मेरी तबियत ठीक नहीं है।",transliteration:"Aajkal merī tabiyat ṭhīk nahī̃ hai.",translation:"These days my health is not good. (present)"},{sentence:"उसकी तबियत बिगड़ गई है इसलिए वह बिस्तर पर है।",transliteration:"Uskī tabiyat bigṛ gaī hai isliye vah bistar par hai.",translation:"His health has deteriorated so he is in bed. (present perfect)"}],id:"bulk_1780139454871_72"},{devanagari:"तस्वीर",transliteration:"tasvīr",meaning:"picture / photograph / portrait / image",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"यह तस्वीर बहुत सुंदर है।",transliteration:"yah tasvīr bahut sundar hai.",translation:"This picture is very beautiful. (present)"},{sentence:"मैंने अपनी तस्वीर दीवार पर लगाई।",transliteration:"main apnī tasvīr dīvār par lagāī.",translation:"I hung my photograph on the wall. (past)"}],id:"bulk_1780139456715_73"},{devanagari:"ताकि",transliteration:"tāki",meaning:"so that / in order that / so as to",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"मैं जल्दी आ गया ताकि तुम्हें इंतज़ार न करना पड़े।",transliteration:"maiṁ jaldī ā gayā tāki tumhẽ intazār na karnā paṛe.",translation:"I came early so that you wouldn't have to wait. (past)"},{sentence:"वह मेहनत करता है ताकि अपना सपना पूरा कर सके।",transliteration:"vah mehnat kartā hai tāki apnā sapnā pūrā kar sake.",translation:"He works hard so that he can fulfill his dream. (present)"}],id:"bulk_1780139459070_74"},{devanagari:"ताज़ा",transliteration:"tāzā",meaning:"fresh / new / recent",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"यह ताज़ा दूध बहुत अच्छा है।",transliteration:"yah tāzā dūdh bahut achhā hai.",translation:"This fresh milk is very good. (present)"},{sentence:"मुझे ताज़ी खबर सुनने को मिली।",transliteration:"mujhe tāzī khabar sunne ko milī.",translation:"I got to hear fresh news. (past)"}],id:"bulk_1780139461016_75"},{devanagari:"ताश",transliteration:"tāś",meaning:"playing cards / a card game",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"बच्चों को ताश खेलना बहुत पसंद है।",transliteration:"bacchoṁ ko tāś khelnā bahut pasand hai.",translation:"Children like playing cards very much. (present)"},{sentence:"उसने मेज पर ताश के पत्ते बिखेर दिए।",transliteration:"usne mez par tāś ke patte bikh€r die.",translation:"He scattered the playing cards on the table. (past)"}],id:"bulk_1780139464088_76"},{devanagari:"तैयार",transliteration:"taiyār",meaning:"ready / prepared / willing",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"क्या तुम कल के लिए तैयार हो?",transliteration:"Kyā tum kal ke lie taiyār ho?",translation:"Are you ready for tomorrow? (present)"},{sentence:"मैं परीक्षा के लिए तैयार हूँ।",transliteration:"Main parikṣā ke lie taiyār hū̃.",translation:"I am prepared for the exam. (present)"}],id:"bulk_1780139466033_77"},{devanagari:"तैयार करना",transliteration:"taiyār karnā",meaning:"to prepare / to make ready / to arrange",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"मैं खाना तैयार करने जा रहा हूँ।",transliteration:"Main khānā taiyār karne jā rahā hū̃.",translation:"I am going to prepare food. (present continuous)"},{sentence:"उसने परीक्षा के लिए खुद को तैयार किया।",transliteration:"Usne parīkshā ke lie khud ko taiyār kiyā.",translation:"He prepared himself for the exam. (past)"}],id:"bulk_1780139468081_78"},{devanagari:"तैयारी",transliteration:"taiyārī",meaning:"preparation / readiness / arrangement",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"परीक्षा की तैयारी करने के लिए मुझे दो महीने चाहिए।",transliteration:"Parīkṣā kī taiyārī karne ke lie mujhe do mahīne chāhie.",translation:"I need two months to prepare for the exam. (present)"},{sentence:"विवाह की तैयारी अभी से शुरू हो गई है।",transliteration:"Vivāh kī taiyārī abhī se śurū ho gaī hai.",translation:"The wedding preparations have already begun. (present perfect)"}],id:"bulk_1780139471153_79"},{devanagari:"तो",transliteration:"to",meaning:"then / so / in that case / (emphatic particle)",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"अगर बारिश होगी तो हम घर में रहेंगे।",transliteration:"agar bāriś hogī to ham ghar mẽ rahẽge.",translation:"If it rains, then we will stay at home. (future)"},{sentence:"तुम तो हमेशा देर से आते हो।",transliteration:"tum to hameshā der se āte ho.",translation:"You are always late (emphatic). (present habitual)"}],id:"bulk_1780139474225_80"},{devanagari:"तोड़ना",transliteration:"toṛnā",meaning:"to break / to crack / to fracture / to smash / to destroy",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"उसने गुस्से में प्याले को तोड़ दिया।",transliteration:"usne gusse mẽ pyāle ko toṛ diyā.",translation:"He broke the cup in anger. (past)"},{sentence:"बच्चे खेल के दौरान खिड़की तोड़ सकते हैं।",transliteration:"bache khel ke daurān khiṛkī toṛ sakte haiṁ.",translation:"Children can break the window while playing. (present/potential)"}],id:"bulk_1780139476683_81"},{devanagari:"तोता",transliteration:"totā",meaning:"parrot / a talkative person",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"बगीचे में एक हरा तोता बैठा है।",transliteration:"bagīche meṁ ek harā totā baiṭhā hai.",translation:"A green parrot is sitting in the garden. (present)"},{sentence:"उस तोते ने मुझे बहुत परेशान कर दिया।",transliteration:"us tote ne mujhe bahut pareshān kar diyā.",translation:"That parrot troubled me a lot. (past)"}],id:"bulk_1780139478938_82"},{devanagari:"तोहफ़ा",transliteration:"tohfā",meaning:"gift / present / offering",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"उसने मुझे जन्मदिन पर एक सुंदर तोहफ़ा दिया।",transliteration:"Usne mujhe janmdin par ek sundar tohfā diyā.",translation:"He/She gave me a beautiful gift on my birthday. (past)"},{sentence:"यह तोहफ़ा आपके प्रति मेरे प्यार का प्रतीक है।",transliteration:"Yah tohfā āpke prati mere pyār kā pratīk hai.",translation:"This gift is a symbol of my love for you. (present)"}],id:"bulk_1780139481393_83"},{devanagari:"थकना",transliteration:"thaknā",meaning:"to become tired / to be exhausted / to wear out",category:"verb",gender:null,transitive:!1,unit:null,examples:[{sentence:"मैं पूरे दिन काम करने के बाद थक गया।",transliteration:"maiṁ pūre din kām karne ke bād thak gayā.",translation:"I became tired after working the whole day. (past)"},{sentence:"वह लंबी यात्रा से थक रहा है।",transliteration:"vah lambī yātrā se thak rahā hai.",translation:"He is getting tired from the long journey. (present)"}],id:"bulk_1780139483935_84"},{devanagari:"थाना",transliteration:"thānā",meaning:"police station / a temporary shed or shelter",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"उसे पुलिस थाने में ले जाया गया।",transliteration:"Use pulis thāne mẽ le jāyā gayā.",translation:"He was taken to the police station. (past)"},{sentence:"गाँव के थाने का सिपाही बहुत अच्छा है।",transliteration:"Gāv ke thāne kā sipāhī bahut achhā hai.",translation:"The constable at the village police station is very good. (present)"}],id:"bulk_1780139487027_85"},{devanagari:"थोड़ा",transliteration:"thoṛā",meaning:"a little / a small amount / somewhat / rather",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"मुझे थोड़ा पानी चाहिए।",transliteration:"mujhe thoṛā pānī chāhie.",translation:"I need a little water. (present)"},{sentence:"यह काम थोड़ा मुश्किल है।",transliteration:"yah kām thoṛā muśkil hai.",translation:"This work is somewhat difficult. (present)"}],id:"bulk_1780139488869_86"},{devanagari:"थोड़ी देर",transliteration:"thoṛī der",meaning:"a little while / a short time / shortly",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"कृपया थोड़ी देर प्रतीक्षा करें।",transliteration:"kripayā thoṛī der pratīkṣā karen.",translation:"Please wait for a little while. (present)"},{sentence:"वह थोड़ी देर में यहाँ पहुँच जाएगा।",transliteration:"vah thoṛī der mein yahāṅ pahũch jāegā.",translation:"He will arrive here in a short time. (future)"}],id:"bulk_1780139491121_87"},{devanagari:"दक्षिण",transliteration:"dakṣiṇ",meaning:"south / right / skilled / expert",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"भारत का दक्षिण भाग बहुत सुंदर है।",transliteration:"bhārat kā dakṣiṇ bhāg bahut sundar hai.",translation:"The southern part of India is very beautiful. (present)"},{sentence:"वह एक दक्षिण शिल्पकार है।",transliteration:"vah ek dakṣiṇ śilpkār hai.",translation:"He is a skilled craftsman. (present)"}],id:"bulk_1780139493682_88"},{devanagari:"दफ़्तर",transliteration:"daftar",meaning:"office / bureau / department / administrative office",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"मैं कल दफ़्तर जाऊँगा।",transliteration:"maiṁ kal daftar jāūṁgā.",translation:"I will go to the office tomorrow. (future)"},{sentence:"वह दफ़्तर में काम करता है।",transliteration:"vah daftar meṁ kām kartā hai.",translation:"He works in the office. (present)"}],id:"bulk_1780139495524_89"},{devanagari:"दयालु",transliteration:"dayālu",meaning:"compassionate / merciful / kind-hearted",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"वह एक दयालु व्यक्ति है जो हमेशा दूसरों की मदद करता है।",transliteration:"vah ek dayālu vyakti hai jo hameshā dūsrõ kī madad kartā hai.",translation:"He is a compassionate person who always helps others. (present)"},{sentence:"राजा दयालु था और अपनी प्रजा के लिए न्यायसंगत निर्णय लेता था।",transliteration:"rājā dayālu thā aur apnī prajā ke lie nyāysaṅgat nirnay letā thā.",translation:"The king was merciful and made just decisions for his subjects. (past)"}],id:"bulk_1780139498085_90"},{devanagari:"दर्द",transliteration:"dard",meaning:"pain / ache / sorrow / suffering",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"मेरे सिर में बहुत दर्द है।",transliteration:"mere sir mein bahut dard hai.",translation:"I have a lot of pain in my head. (present)"},{sentence:"उसके दिल का दर्द कभी ठीक नहीं हुआ।",transliteration:"uske dil ka dard kabhi theek nahin hua.",translation:"The pain in his heart never healed. (past)"}],id:"bulk_1780190366814_0"},{devanagari:"दवा",transliteration:"davā",meaning:"medicine / drug / remedy / medicament",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"डॉक्टर ने मुझे सर्दी के लिए दवा दी।",transliteration:"ḍŏktar ne mujhe sardi ke lie davā dī.",translation:"The doctor gave me medicine for a cold. (past)"},{sentence:"यह दवा दिन में तीन बार लेनी चाहिए।",transliteration:"yah davā din mein tīn bār lenī chāhie.",translation:"This medicine should be taken three times a day. (present)"}],id:"bulk_1780190369258_1"},{devanagari:"दवाखाना",transliteration:"davākhānā",meaning:"pharmacy / drugstore / medicine shop / dispensary",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"मुझे दवाखाने से दवा लानी है।",transliteration:"mujhe davākhāne se davā lānī hai.",translation:"I need to get medicine from the pharmacy. (present)"},{sentence:"यह दवाखाना सप्ताह में सातों दिन खुला रहता है।",transliteration:"yah davākhānā saptāh meṁ sātoṁ din khulā rehtā hai.",translation:"This drugstore remains open seven days a week. (present habitual)"}],id:"bulk_1780190371525_2"},{devanagari:"दस्त",transliteration:"dast",meaning:"diarrhea / loose motion",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"बच्चे को दस्त हो गए हैं।",transliteration:"Bacche ko dast ho gaye haiñ.",translation:"The child has diarrhea. (present perfect)"},{sentence:"दस्त से बचने के लिए साफ पानी पिएं।",transliteration:"Dast se bachne ke liye sāf pānī piẽ.",translation:"Drink clean water to avoid diarrhea. (imperative)"}],id:"bulk_1780190373472_3"},{devanagari:"दस्त आना",transliteration:"dast ānā",meaning:"to have diarrhea / to suffer from loose motions",category:"verb",gender:null,transitive:!1,unit:null,examples:[{sentence:"कल मुझे दस्त आ गए।",transliteration:"kal mujhe dast ā gae.",translation:"I had diarrhea yesterday. (past)"},{sentence:"गर्मियों में अक्सर बच्चों को दस्त आते हैं।",transliteration:"garmiyõ mẽ aksar bachchõ ko dast āte haiṃ.",translation:"Children often get diarrhea in summers. (present habitual)"}],id:"bulk_1780190376441_4"},{devanagari:"दाँत",transliteration:"dānt",meaning:"tooth / tusk",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"मेरे दाँत में दर्द है।",transliteration:"mere dānt mẽ dard hai.",translation:"I have a toothache. (present)"},{sentence:"हाथी के दाँत बहुत लंबे होते हैं।",transliteration:"hāthī ke dānt bahut lambe hote haiṃ.",translation:"An elephant's tusks are very long. (present)"}],id:"bulk_1780190378240_5"},{devanagari:"दादा",transliteration:"dādā",meaning:"paternal grandfather / elder brother (informal/affectionate)",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"मेरा दादा हर दिन पार्क में टहलते हैं।",transliteration:"merā dādā har din pārk mẽ tahlete haiṁ.",translation:"My grandfather walks in the park every day. (present habitual)"},{sentence:"दादा ने मुझे बचपन में बहुत प्यार दिया।",transliteration:"dādā ne mujhe bachpan mẽ bahut pyār diyā.",translation:"My grandfather gave me a lot of affection in my childhood. (past)"}],id:"bulk_1780190385045_6"},{devanagari:"दादी",transliteration:"dādī",meaning:"grandmother / paternal grandmother",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"मेरी दादी बहुत प्यारी हैं।",transliteration:"merī dādī bahut pyārī haiṁ.",translation:"My grandmother is very lovely. (present)"},{sentence:"दादी ने मुझे कहानी सुनाई।",transliteration:"dādī ne mujhe kahānī sunāī.",translation:"Grandmother told me a story. (past)"}],id:"bulk_1780190386808_7"},{devanagari:"दाहिना",transliteration:"dāhinā",meaning:"right (direction) / right-hand side",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"मेरा दाहिना हाथ टूट गया है।",transliteration:"merā dāhinā hāth ṭūṭ gayā hai.",translation:"My right hand is broken. (present)"},{sentence:"दाहिने मुड़ो और सीधे चलते रहो।",transliteration:"dāhine muṛo aur sīdhe chalte raho.",translation:"Turn right and keep going straight. (imperative)"}],id:"bulk_1780190389000_8"},{devanagari:"दिखाना",transliteration:"dikhānā",meaning:"to show / to display / to appear / to seem",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"कृपया मुझे अपना पासपोर्ट दिखाइए।",transliteration:"kripayā mujhe apnā pāsport dikhāie.",translation:"Please show me your passport. (imperative)"},{sentence:"उसके चेहरे पर खुशी दिख रही थी।",transliteration:"uske chehre par khushī dikh rahī thī.",translation:"Happiness was showing on his face. (past continuous)"}],id:"bulk_1780190391254_9"},{devanagari:"दिन",transliteration:"din",meaning:"day / daytime",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"आज का दिन बहुत सुंदर है।",transliteration:"āj kā din bahut sundar hai.",translation:"Today's day is very beautiful. (present)"},{sentence:"हर दिन मैं सुबह जल्दी उठता हूँ।",transliteration:"har din main subah jaldi uthta hoon.",translation:"Every day I wake up early in the morning. (present habitual)"}],id:"bulk_1780190392892_10"},{devanagari:"दिया",transliteration:"diyā",meaning:"gave / lamp / provided",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"मेंने उसे एक किताब दी।",transliteration:"mẽne use ek kitāb dī.",translation:"I gave him a book. (past)"},{sentence:"उसने मुझे एक दिया दिया।",transliteration:"usne mujhe ek diyā diyā.",translation:"He gave me a lamp. (past)"}],id:"bulk_1780190394461_11"},{devanagari:"दिल",transliteration:"dil",meaning:"heart / mind / soul / courage",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"मेरा दिल बहुत खुश है।",transliteration:"merā dil bahut khush hai.",translation:"My heart is very happy. (present)"},{sentence:"उसका दिल साफ है।",transliteration:"uskā dil sāf hai.",translation:"His heart is pure. (present)"}],id:"bulk_1780190396419_12"},{devanagari:"दीवार",transliteration:"dīvār",meaning:"wall / barrier",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"घर की दीवार बहुत मजबूत है।",transliteration:"ghar kī dīvār bahut majbūt hai.",translation:"The house's wall is very strong. (present)"},{sentence:"उसने दीवार पर एक तस्वीर लगाई।",transliteration:"usne dīvār par ek tasvīr lagāī.",translation:"He hung a picture on the wall. (past)"}],id:"bulk_1780190398160_13"},{devanagari:"दीवार",transliteration:"dīvār",meaning:"wall / partition",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"घर की दीवार बहुत मजबूत है।",transliteration:"ghar kī dīvār bahut majbūt hai.",translation:"The house's wall is very strong. (present)"},{sentence:"उसने दीवार पर तस्वीर लगाई।",transliteration:"usne dīvār par tasvīr lagāī.",translation:"He hung a picture on the wall. (past)"}],id:"bulk_1780190400089_14"},{devanagari:"दुकान",transliteration:"dukān",meaning:"shop / store / stall",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"मेरे पिता जी की एक छोटी सी दुकान है।",transliteration:"Mere pitā jī kī ek chhoṭī sī dukān hai.",translation:"My father has a small shop. (present)"},{sentence:"वह हर दिन सुबह दुकान खोलते हैं।",transliteration:"Vah har din subah dukān khōlte haiṁ.",translation:"He opens the shop every morning. (present habitual)"}],id:"bulk_1780190402251_15"},{devanagari:"दुकानदार",transliteration:"dukāndār",meaning:"shopkeeper / storekeeper / merchant",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"दुकानदार ने मुझे सामान बेचा।",transliteration:"dukāndār ne mujhe sāmān bechā.",translation:"The shopkeeper sold me goods. (past)"},{sentence:"वह दुकानदार हर दिन अपनी दुकान खोलता है।",transliteration:"vah dukāndār har din apnī dukān kholtā hai.",translation:"That shopkeeper opens his shop every day. (present)"}],id:"bulk_1780190404351_16"},{devanagari:"दुखी",transliteration:"dukhī",meaning:"sad / unhappy / sorrowful / distressed",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"वह बहुत दुखी दिखाई दे रहा है।",transliteration:"vah bahut dukhī dikhāī de rahā hai.",translation:"He looks very sad. (present)"},{sentence:"उसके दुखी चेहरे को देखकर मुझे भी दुख हुआ।",transliteration:"uske dukhī chehre ko dekhkar mujhe bhī dukh huā.",translation:"Seeing his sorrowful face, I felt sad too. (past)"}],id:"bulk_1780190406497_17"},{devanagari:"दुर्घटना",transliteration:"durghṭnā",meaning:"accident / mishap / misfortune",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"कल सड़क पर एक भीषण दुर्घटना हुई।",transliteration:"kal sāṛak par ek bhīṣaṇ durghṭnā huī.",translation:"A terrible accident happened on the road yesterday. (past)"},{sentence:"यह दुर्घटना किसी की लापरवाही के कारण घटी।",transliteration:"yah durghṭnā kisī kī lāparwāhī ke kāraṇ ghaṭī.",translation:"This accident occurred due to someone's negligence. (past)"}],id:"bulk_1780190409081_18"},{devanagari:"दूध",transliteration:"dūdh",meaning:"milk",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"मुझे रोज़ सुबह दूध पीना पसंद है।",transliteration:"mujhe roz subah dūdh pīnā pasand hai.",translation:"I like to drink milk every morning. (present)"},{sentence:"बच्चे ने कप से दूध पिया।",transliteration:"bacche ne kap se dūdh piyā.",translation:"The child drank milk from the cup. (past)"}],id:"bulk_1780190410809_19"},{devanagari:"दूधवाला",transliteration:"dūdhvālā",meaning:"milkman / milk seller / one who sells or delivers milk",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"हर सुबह दूधवाला घर आता है।",transliteration:"har subah dūdhvālā ghar ātā hai.",translation:"The milkman comes to the house every morning. (present)"},{sentence:"मैंने दूधवाले से दो लीटर दूध मंगवाया।",transliteration:"maiṁne dūdhvāle se do lītar dūdh mangvāyā.",translation:"I ordered two liters of milk from the milkman. (past)"}],id:"bulk_1780190413095_20"},{devanagari:"दूर",transliteration:"dūr",meaning:"far / distant / remote / away",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"वह शहर से दूर रहता है।",transliteration:"vah śahr se dūr rahtā hai.",translation:"He lives far from the city. (present)"},{sentence:"मेरा घर स्कूल से दूर नहीं है।",transliteration:"merā ghar skūl se dūr nahī̃ hai.",translation:"My house is not far from the school. (present)"}],id:"bulk_1780190414850_21"},{devanagari:"देखना",transliteration:"dekhna",meaning:"to see / to look / to watch / to observe",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"मैं कल फिल्म देखूंगा।",transliteration:"maiṁ kal film dekhūngā.",translation:"I will watch a movie tomorrow. (future)"},{sentence:"क्या तुमने यह पक्षी देखा है?",transliteration:"kyā tumne yah pakṣī dekhā hai?",translation:"Have you seen this bird? (present perfect)"}],id:"bulk_1780190416777_22"},{devanagari:"देना",transliteration:"denā",meaning:"to give / to provide / to deliver / to hand over",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"मुझे एक गिलास पानी देना।",transliteration:"Mujhe ek gilās pānī denā.",translation:"Give me a glass of water. (imperative)"},{sentence:"उसने मुझे एक किताब दी।",transliteration:"Usne mujhe ek kitāb dī.",translation:"He/She gave me a book. (past)"}],id:"bulk_1780190418554_23"},{devanagari:"देर",transliteration:"der",meaning:"delay / lateness / time taken / to delay / to be late",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"ट्रेन को देर हो गई।",transliteration:"Ṭren ko der ho gaī.",translation:"The train was delayed. (past)"},{sentence:"कृपया देर न करें।",transliteration:"Kṛpayā der na kareṁ.",translation:"Please do not delay. (imperative)"}],id:"bulk_1780190420231_24"},{devanagari:"हमको जाने दो",transliteration:"hamko jāne do",meaning:"Let me go / Allow me to leave / Let us go",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"कृपया मुझे जाने दो, मुझे देर हो रही है।",transliteration:"kripayā mujhe jāne do, mujhe der ho rahī hai.",translation:"Please let me go, I am getting late. (present)"},{sentence:"बस हमको जाने दो, हम वापस आ जाएंगे।",transliteration:"bas hamko jāne do, ham vāpas ā jāeṅge.",translation:"Just let us go, we will come back. (future)"}],id:"bulk_1780190422370_25"},{devanagari:"देरी",transliteration:"derī",meaning:"delay / lateness / postponement",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"ट्रेन को स्टेशन पर देरी हुई।",transliteration:"ṭren ko steshan par derī huī.",translation:"The train was delayed at the station. (past)"},{sentence:"कृपया देरी न करें और जल्दी आ जाएं।",transliteration:"kripayā derī na karen aur jaldī ā jāen.",translation:"Please don't delay and come quickly. (present imperative)"}],id:"bulk_1780190424570_26"},{devanagari:"देश",transliteration:"deś",meaning:"country / nation / region / land",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"भारत एक महान देश है।",transliteration:"bhārat ek mahān deś hai.",translation:"India is a great country. (present)"},{sentence:"हमारे देश के नागरिक बहुत वीर हैं।",transliteration:"hamāre deś ke nāgarik bahut vīr haiṁ.",translation:"The citizens of our country are very brave. (present)"}],id:"bulk_1780190426434_27"},{devanagari:"दोनों",transliteration:"donõ",meaning:"both / both of them",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"राज और प्रिया दोनों स्कूल जाते हैं।",transliteration:"Rāj aur Priyā donõ skūl jāte haiṁ.",translation:"Both Raj and Priya go to school. (present)"},{sentence:"मुझे दोनों फल पसंद हैं।",transliteration:"Mujhe donõ phal pasand haiṁ.",translation:"I like both fruits. (present)"}],id:"bulk_1780190428422_28"},{devanagari:"दोस्त",transliteration:"dost",meaning:"friend / companion / ally",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"वह मेरा सबसे अच्छा दोस्त है।",transliteration:"vah merā sabse achhā dost hai.",translation:"He is my best friend. (present)"},{sentence:"मेरे दोस्त ने मुझे कल फोन किया।",transliteration:"mere dost ne mujhe kal phon kiyā.",translation:"My friend called me yesterday. (past)"}],id:"bulk_1780190430508_29"},{devanagari:"दौड़ना",transliteration:"daurṇā",meaning:"to run / to race / to rush",category:"verb",gender:null,transitive:!1,unit:null,examples:[{sentence:"बच्चा पार्क में दौड़ रहा है।",transliteration:"Baccā pārak mein daurṛ rahā hai.",translation:"The child is running in the park. (present continuous)"},{sentence:"वह कल स्कूल के लिए दौड़ा।",transliteration:"Vah kal skūl ke lie daurṛā.",translation:"He ran to school yesterday. (past)"}],id:"bulk_1780190432560_30"},{devanagari:"धीरे",transliteration:"dhīre",meaning:"slowly / gently / softly / carefully",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"कृपया धीरे चलिए, जल्दबाजी न करें।",transliteration:"kṛpayā dhīre chaliẽ, jaldabāzī na karẽ.",translation:"Please walk slowly, don't hurry. (imperative)"},{sentence:"वह धीरे-धीरे सीढ़ियों से नीचे उतर रहा था।",transliteration:"vah dhīre-dhīre sīṛhiyõ se nīche utar rahā thā.",translation:"He was coming down the stairs slowly and carefully. (past continuous)"}],id:"bulk_1780190435731_31"},{devanagari:"धुलना",transliteration:"dhulnā",meaning:"to be washed / to wash (intransitive) / to be cleaned",category:"verb",gender:null,transitive:!1,unit:null,examples:[{sentence:"कपड़े धुल गए।",transliteration:"kapṛe dhul gae.",translation:"The clothes have been washed. (present perfect)"},{sentence:"मेरी शर्ट कल धुलेगी।",transliteration:"merī śart kal dhulegiī.",translation:"My shirt will be washed tomorrow. (future)"}],id:"bulk_1780190438086_32"},{devanagari:"धुलवाना",transliteration:"dhulvānā",meaning:"to get washed / to have something washed (by someone else)",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"मैं अपनी कार धुलवाना चाहता हूँ।",transliteration:"maiṁ apnī kār dhulvānā chāhtā hūँ.",translation:"I want to get my car washed. (present)"},{sentence:"उसने बाजार में अपने कपड़े धुलवा दिए।",transliteration:"usnē bāzār meiṁ apnē kapṛē dhulvā diye.",translation:"He got his clothes washed at the market. (past)"}],id:"bulk_1780190440443_33"},{devanagari:"धोना",transliteration:"dhonā",meaning:"to wash / to cleanse",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"मैं हर दिन अपने हाथ धोता हूँ।",transliteration:"maiṁ har din apne hāth dhotā hūṁ.",translation:"I wash my hands every day. (present)"},{sentence:"उसने कपड़े धो दिए।",transliteration:"usne kapṛe dho die.",translation:"She washed the clothes. (past)"}],id:"bulk_1780190442284_34"},{devanagari:"धोबी",transliteration:"dhobī",meaning:"washerman / launderer / one who washes clothes",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"धोबी कपड़े धोने के लिए नदी पर जाता है।",transliteration:"dhobī kapṛe dhone ke lie nadī par jātā hai.",translation:"The washerman goes to the river to wash clothes. (present habitual)"},{sentence:"हमारे धोबी ने सभी कपड़े बहुत अच्छे से धो दिए हैं।",transliteration:"hamāre dhobī ne sabhī kapṛe bahut achche se dho die haiṁ.",translation:"Our washerman has washed all the clothes very well. (present perfect)"}],id:"bulk_1780190444838_35"},{devanagari:"ध्यान",transliteration:"dhyāna",meaning:"attention / concentration / meditation / heed / care",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"कृपया इस महत्वपूर्ण बात पर ध्यान दीजिए।",transliteration:"kṛpayā is mahattvapur̥ṇ bāt par dhyān dījie.",translation:"Please pay attention to this important matter. (imperative)"},{sentence:"योग में ध्यान करना मन को शांत करता है।",transliteration:"yog mẽ dhyān karnā man ko śānt kartā hai.",translation:"Meditation in yoga calms the mind. (present)"}],id:"bulk_1780190447199_36"},{devanagari:"ध्यान से",transliteration:"dhyān se",meaning:"carefully / attentively / with attention / mindfully",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"कृपया ध्यान से सुनिए।",transliteration:"kripayā dhyān se suniie.",translation:"Please listen carefully. (present)"},{sentence:"उसने ध्यान से किताब पढ़ी।",transliteration:"usne dhyān se kitāb paṛhī.",translation:"She read the book attentively. (past)"}],id:"bulk_1780190448980_37"},{devanagari:"ध्यान रखना",transliteration:"dhyān rakhnā",meaning:"to pay attention / to be careful / to take care / to look after",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"कृपया अपने स्वास्थ्य का ध्यान रखना।",transliteration:"kripayā apne svāsthya kā dhyān rakhnā.",translation:"Please take care of your health. (imperative)"},{sentence:"मुझे यह ध्यान रखना है कि मैं समय पर पहुँचूँ।",transliteration:"mujhe yah dhyān rakhnā hai ki main samay par pahunchūñ.",translation:"I need to be careful to arrive on time. (present)"}],id:"bulk_1780190451193_38"},{devanagari:"नक़्शा",transliteration:"naqśā",meaning:"map / plan / design / sketch / blueprint",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"मुझे इस शहर का नक़्शा दिखाइए।",transliteration:"mujhe is śahr kā naqśā dikhāie.",translation:"Show me the map of this city. (present)"},{sentence:"आर्किटेक्ट ने नए भवन का नक़्शा तैयार किया।",transliteration:"ārkiteKṭ ne nae bhavan kā naqśā taiyār kiyā.",translation:"The architect prepared the blueprint of the new building. (past)"}],id:"bulk_1780190453503_39"},{devanagari:"नदी",transliteration:"nadī",meaning:"river",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"गंगा एक पवित्र नदी है।",transliteration:"Gaṅgā ek pavitra nadī hai.",translation:"The Ganges is a sacred river. (present)"},{sentence:"हम नदी के किनारे बैठे थे।",transliteration:"Ham nadī ke kināre baiṭhe the.",translation:"We were sitting by the riverside. (past)"}],id:"bulk_1780190455191_40"},{devanagari:"नया",transliteration:"nayā",meaning:"new / fresh / recent",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"मेरे पास एक नया फोन है।",transliteration:"mere pās ek nayā phon hai.",translation:"I have a new phone. (present)"},{sentence:"उसने नए कपड़े खरीदे।",transliteration:"usne nae kapṛe kharīde.",translation:"He/She bought new clothes. (past)"}],id:"bulk_1780190456945_41"},{devanagari:"नर्स",transliteration:"nars",meaning:"nurse",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"अस्पताल में एक नर्स मरीज़ की देखभाल कर रही है।",transliteration:"aspatāl mẽ ek nars marīz kī dekhbhāl kar rahī hai.",translation:"A nurse is taking care of a patient in the hospital. (present)"},{sentence:"यह नर्स बहुत अनुभवी और मेहनती है।",transliteration:"yah nars bahut anubhavī aur mehnatī hai.",translation:"This nurse is very experienced and hardworking. (present)"}],id:"bulk_1780190458896_42"},{devanagari:"नल",transliteration:"nal",meaning:"pipe / tube / spout / faucet / tap",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"नल से पानी बह रहा है।",transliteration:"nal se pānī bah rahā hai.",translation:"Water is flowing from the tap. (present)"},{sentence:"मुझे नल को ठीक करना है।",transliteration:"mujhe nal ko ṭhīk karnā hai.",translation:"I need to fix the pipe. (present)"}],id:"bulk_1780190460615_43"},{devanagari:"नहाना",transliteration:"nahānā",meaning:"to bathe / to take a bath / to wash oneself",category:"verb",gender:null,transitive:!1,unit:null,examples:[{sentence:"मैं हर सुबह नहाता हूँ।",transliteration:"maiṁ har subah nahātā hūँ.",translation:"I bathe every morning. (present habitual)"},{sentence:"बच्चों को नहाना पड़ता है।",transliteration:"bacchoṁ ko nahānā paṛtā hai.",translation:"One has to bathe the children. (present habitual - transitive use)"}],id:"bulk_1780190462765_44"},{devanagari:"नहीं",transliteration:"nahī̃",meaning:"no / not",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"क्या तुम कल आओगे? नहीं, मैं नहीं आ सकता।",transliteration:"kyā tum kal āoge? nahī̃, maiṁ nahī̃ ā saktā.",translation:"Will you come tomorrow? No, I cannot come. (present/future)"},{sentence:"यह किताब अच्छी नहीं है।",transliteration:"yah kitāb achhī nahī̃ hai.",translation:"This book is not good. (present)"}],id:"bulk_1780190464963_45"},{devanagari:"नाक",transliteration:"nāk",meaning:"nose / prestige / honor",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"मेरी नाक बह रही है।",transliteration:"merī nāk bah rahī hai.",translation:"My nose is running. (present)"},{sentence:"उसने मेरी नाक कट दी।",transliteration:"usne merī nāk kat dī.",translation:"He/She disgraced me. (past)"}],id:"bulk_1780190466760_46"},{devanagari:"नाराज़",transliteration:"nārāz",meaning:"displeased / angry / upset / offended",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"वह मेरे से नाराज़ है क्योंकि मैंने उसकी बात नहीं मानी।",transliteration:"vah mere se nārāz hai kyonki maine uski bāt nahī māni.",translation:"He is upset with me because I didn't listen to him. (present)"},{sentence:"अगर तुम देर करोगे तो माँ नाराज़ हो जाएगी।",transliteration:"agar tum der karoge to mā nārāz ho jāegī.",translation:"If you delay, mother will become angry. (future)"}],id:"bulk_1780190469116_47"},{devanagari:"नाव",transliteration:"nāv",meaning:"boat / ship",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"हम नदी में नाव से यात्रा कर रहे हैं।",transliteration:"ham nadī mẽ nāv se yātrā kar rahe haiṃ.",translation:"We are traveling by boat in the river. (present continuous)"},{sentence:"मछुआरे की नाव बहुत पुरानी है।",transliteration:"machhuāre kī nāv bahut purānī hai.",translation:"The fisherman's boat is very old. (present)"}],id:"bulk_1780190471469_48"},{devanagari:"नाश्ता",transliteration:"nāśtā",meaning:"breakfast / morning meal",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"मैं हर सुबह 7 बजे नाश्ता करता हूँ।",transliteration:"Maiṁ har subah 7 baje nāśtā kartā hū̃.",translation:"I eat breakfast every morning at 7 o'clock. (present)"},{sentence:"आज का नाश्ता बहुत स्वादिष्ट था।",transliteration:"Āj kā nāśtā bahut svādiṣṭ thā.",translation:"Today's breakfast was very delicious. (past)"}],id:"bulk_1780190474438_49"},{devanagari:"नाश्ता करना",transliteration:"nāśtā karnā",meaning:"to have breakfast / to eat breakfast",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"मैं हर सुबह सात बजे नाश्ता करता हूँ।",transliteration:"maiṁ har subah sāt baje nāśtā kartā hūँ.",translation:"I have breakfast at seven o'clock every morning. (present habitual)"},{sentence:"क्या तुमने आज नाश्ता कर लिया?",transliteration:"kyā tumne āj nāśtā kar liyā?",translation:"Have you had breakfast today? (present perfect)"}],id:"bulk_1780190476724_50"},{devanagari:"निकालना",transliteration:"nikālnā",meaning:"to take out / to pull out / to extract / to remove / to produce / to derive",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"मुझे अपने जेब से चाबी निकालनी है।",transliteration:"mujhe apne jeb se chābī nikālnī hai.",translation:"I need to take out the key from my pocket. (present)"},{sentence:"उसने अपना पासपोर्ट निकाला।",transliteration:"usne apnā pāsport nikālā.",translation:"He/She took out his/her passport. (past)"}],id:"bulk_1780190478847_51"},{devanagari:"नीचे",transliteration:"nīche",meaning:"below / down / underneath / under",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"किताब मेज के नीचे है।",transliteration:"Kitāb mej ke nīche hai.",translation:"The book is under the table. (present)"},{sentence:"वह नीचे की सीढ़ी पर बैठ गया।",transliteration:"Vah nīche kī sīṛhī par baiṭh gayā.",translation:"He sat down on the lower step. (past)"}],id:"bulk_1780190480889_52"},{devanagari:"नींद",transliteration:"nīnd",meaning:"sleep / slumber / drowsiness",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"मुझे रात भर नींद नहीं आई।",transliteration:"Mujhe rāt bhar nīnd nahī̃ āī.",translation:"I couldn't sleep the whole night. (past)"},{sentence:"गहरी नींद में वह कुछ नहीं सुन सकता।",transliteration:"Gahri nīnd mẽ vah kuch nahī̃ sun saktā.",translation:"In deep sleep, he cannot hear anything. (present)"}],id:"bulk_1780190482938_53"},{devanagari:"नींद आना",transliteration:"nīnd ānā",meaning:"to fall asleep / to feel sleepy / sleep to come",category:"verb",gender:null,transitive:!1,unit:null,examples:[{sentence:"मुझे रात को नींद नहीं आ रही है।",transliteration:"mujhe rāt ko nīnd nahī̃ ā rahī hai.",translation:"I am not able to sleep at night. (present)"},{sentence:"बच्चे को खेलने के बाद जल्दी नींद आ गई।",transliteration:"bacche ko kheline ke bād jaldī nīnd ā gaī.",translation:"The child fell asleep quickly after playing. (past)"}],id:"bulk_1780190485203_54"},{devanagari:"नीला",transliteration:"nīlā",meaning:"blue / dark blue",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"आसमान नीला है।",transliteration:"āsmān nīlā hai.",translation:"The sky is blue. (present)"},{sentence:"उसने नीला कुर्ता पहना था।",transliteration:"usne nīlā kurtā phnā thā.",translation:"He wore a blue shirt. (past)"}],id:"bulk_1780190486828_55"},{devanagari:"नेता",transliteration:"netā",meaning:"leader / politician",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"वह देश का एक प्रसिद्ध नेता है।",transliteration:"vah deś kā ek prasiddh netā hai.",translation:"He is a famous leader of the country. (present)"},{sentence:"उस राजनीतिक पार्टी के नेता ने एक महत्वपूर्ण भाषण दिया।",transliteration:"us rājnītik pārti ke netā ne ek mahatvapūrn bhāshan diyā.",translation:"The leader of that political party gave an important speech. (past)"}],id:"bulk_1780190490414_56"},{devanagari:"नौकर",transliteration:"naukar",meaning:"servant / employee / attendant / hired help",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"राज के घर का नौकर बहुत ईमानदार है।",transliteration:"Rāj ke ghar kā naukar bahut īmāndār hai.",translation:"Raj's house servant is very honest. (present)"},{sentence:"मैंने अपने नौकर को सामान लाने के लिए भेजा।",transliteration:"Maiṁne apne naukar ko sāmān lāne ke lie bhejā.",translation:"I sent my servant to bring the goods. (past)"}],id:"bulk_1780190492669_57"},{devanagari:"नौकरी",transliteration:"naukarī",meaning:"job / employment / service",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"मुझे एक अच्छी नौकरी मिल गई है।",transliteration:"Mujhe ek achhī naukarī mil gaī hai.",translation:"I have gotten a good job. (present perfect)"},{sentence:"वह बैंक में नौकरी करती है।",transliteration:"Vah baink mein naukarī kartī hai.",translation:"She works in a bank. (present)"}],id:"bulk_1780190494407_58"},{devanagari:"पंखा",transliteration:"pakhā",meaning:"fan (cooling device) / wing",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"गर्मी में पंखा चलाना पड़ता है।",transliteration:"garmī mẽ pakhā chalnā paṛtā hai.",translation:"In summer, one has to run the fan. (present)"},{sentence:"चिड़िया के पंखे बहुत सुंदर हैं।",transliteration:"chṛiyā ke pakhе bahut sundar haiñ.",translation:"The bird's wings are very beautiful. (present)"}],id:"bulk_1780190496454_59"},{devanagari:"पकड़ना",transliteration:"pakaṛnā",meaning:"to catch / to hold / to grab / to seize / to arrest",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"पुलिस ने चोर को पकड़ा।",transliteration:"polis ne cor ko pakaṛā.",translation:"The police caught the thief. (past)"},{sentence:"बच्चा अपनी माँ का हाथ पकड़ता है।",transliteration:"baccā apnī mā̃ kā hāth pakaṛtā hai.",translation:"The child holds his mother's hand. (present)"}],id:"bulk_1780190498605_60"},{devanagari:"पड़ना",transliteration:"paṛnā",meaning:"to fall / to lie / to happen / to befall / to be required / to suit",category:"verb",gender:null,transitive:!1,unit:null,examples:[{sentence:"बारिश हो रही है, इसलिए हमें घर पर ही रुकना पड़ेगा।",transliteration:"bāriś ho rahī hai, isliye hamein ghar par hī ruknā paṛegā.",translation:"It is raining, so we will have to stay at home. (future)"},{sentence:"उसके पास बहुत पैसे हैं, लेकिन यह कपड़ा उसे अच्छा नहीं पड़ता।",transliteration:"uske pās bahut paise hain, lekin yah kaprā use achhā nahīn paṛtā.",translation:"He has a lot of money, but this clothing does not suit him. (present)"}],id:"bulk_1780190501434_61"},{devanagari:"मुझे जाना पड़ेगा",transliteration:"mujhe jānā paṛegā",meaning:"I will have to go / I must go",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"मुझे कल दिल्ली जाना पड़ेगा।",transliteration:"mujhe kal dillī jānā paṛegā.",translation:"I will have to go to Delhi tomorrow. (future)"},{sentence:"अगर वह नहीं आया तो मुझे उसे ढूंढने जाना पड़ेगा।",transliteration:"agar vah nahīṃ āyā to mujhe use ḍhūndne jānā paṛegā.",translation:"If he doesn't come, I will have to go find him. (future)"}],id:"bulk_1780190503828_62"},{devanagari:"पड़ा",transliteration:"paṛā",meaning:"lay / fell / situated / happened to / was forced to",category:"verb",gender:null,transitive:null,unit:null,examples:[{sentence:"वह जमीन पर पड़ा था।",transliteration:"Vah jamīn par paṛā thā.",translation:"He lay on the ground. (past)"},{sentence:"मुझे यह काम करना पड़ा।",transliteration:"Mujhe yah kām karnā paṛā.",translation:"I had to do this work. (past)"}],id:"bulk_1780190505840_63"},{devanagari:"पड़ोसी",transliteration:"paṛosī",meaning:"neighbour / adjacent",category:"noun",gender:"m/f",transitive:null,unit:null,examples:[{sentence:"मेरा पड़ोसी बहुत अच्छा व्यक्ति है।",transliteration:"merā paṛosī bahut achhā vyaktī hai.",translation:"My neighbour is a very good person. (present)"},{sentence:"हमारे पड़ोसी कल शहर जा रहे हैं।",transliteration:"hamāre paṛosī kal shahar jā rahe haiṁ.",translation:"Our neighbours are going to the city tomorrow. (near future)"}],id:"bulk_1780190508640_64"},{devanagari:"परोसिन",transliteration:"parosin",meaning:"a woman who serves food / a maidservant",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"परोसिन ने खाना मेज़ पर रख दिया।",transliteration:"parosin ne khānā mez par rakh diyā.",translation:"The maidservant put the food on the table. (past)"},{sentence:"घर की परोसिन रोज़ सुबह आती है।",transliteration:"ghar kī parosin roz subah ātī hai.",translation:"The household maidservant comes every morning. (present)"}],id:"bulk_1780190510587_65"},{devanagari:"पढ़ना",transliteration:"paṛhnā",meaning:"to read / to study",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"मैं हर दिन किताब पढ़ता हूँ।",transliteration:"maiṁ har din kitāb paṛhtā hūṁ.",translation:"I read a book every day. (present habitual)"},{sentence:"उसने कल रात को पत्र पढ़ा।",transliteration:"usnē kal rāt ko patr paṛhā.",translation:"He read the letter last night. (past)"}],id:"bulk_1780190512532_66"},{devanagari:"पढ़ाई",transliteration:"paṛhāī",meaning:"studies / education / schooling / act of teaching or learning",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"मेरी पढ़ाई अच्छी चल रही है।",transliteration:"merī paṛhāī achhī chal rahī hai.",translation:"My studies are going well. (present)"},{sentence:"उसने विदेश जाकर आगे की पढ़ाई की।",transliteration:"usne videśh jākar āge kī paṛhāī kī.",translation:"She went abroad and pursued higher education. (past)"}],id:"bulk_1780190514886_67"},{devanagari:"पढ़ाना",transliteration:"paṛhānā",meaning:"to teach / to instruct / to cause to read or study",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"शिक्षक छात्रों को गणित पढ़ाते हैं।",transliteration:"śikṣak chātrõ ko gaṇit paṛhāte haiṁ.",translation:"The teacher teaches mathematics to the students. (present)"},{sentence:"मेरी माँ ने मुझे हिंदी पढ़ाई थी।",transliteration:"merī mā̃ ne mujhe hindī paṛhāī thī.",translation:"My mother taught me Hindi. (past)"}],id:"bulk_1780190517142_68"},{devanagari:"पतला",transliteration:"patla",meaning:"thin / slender / lean / dilute",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"यह कपड़ा बहुत पतला है।",transliteration:"yah kapda bahut patla hai.",translation:"This cloth is very thin. (present)"},{sentence:"उसका बेटा पतला और लंबा है।",transliteration:"uska beta patla aur lamba hai.",translation:"His son is thin and tall. (present)"}],id:"bulk_1780190518881_69"},{devanagari:"पता",transliteration:"patā",meaning:"address / knowledge / awareness / information / trace / clue",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"मुझे उसका पता नहीं है।",transliteration:"mujhe uskā patā nahī̃ hai.",translation:"I don't know his address / whereabouts. (present)"},{sentence:"पुलिस को चोर का पता चल गया।",transliteration:"pulīs ko cor kā patā cal gayā.",translation:"The police found a clue/trace about the thief. (past)"}],id:"bulk_1780190521134_70"},{devanagari:"पति",transliteration:"pati",meaning:"husband / master / owner / lord",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"मेरी पत्नी का पति बहुत दयालु है।",transliteration:"merī patnī kā pati bahut dayālu hai.",translation:"My wife's husband is very kind. (present)"},{sentence:"वह अपनी पत्नी के लिए एक अच्छा पति था।",transliteration:"vah apnī patnī ke lie ek achhā pati thā.",translation:"He was a good husband for his wife. (past)"}],id:"bulk_1780190523095_71"},{devanagari:"पत्नी",transliteration:"patnī",meaning:"wife / spouse",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"मेरी पत्नी बहुत बुद्धिमान है।",transliteration:"merī patnī bahut buddhimān hai.",translation:"My wife is very intelligent. (present)"},{sentence:"राज की पत्नी कल बाजार गई।",transliteration:"rāj kī patnī kal bāzār gaī.",translation:"Raj's wife went to the market yesterday. (past)"}],id:"bulk_1780190524873_72"},{devanagari:"पत्र",transliteration:"patra",meaning:"letter / document / leaf / newspaper",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"मैंने अपने दोस्त को एक पत्र लिखा।",transliteration:"Mainne apne dost ko ek patra likha.",translation:"I wrote a letter to my friend. (past)"},{sentence:"यह पत्र बहुत महत्वपूर्ण है।",transliteration:"Yah patra bahut mahatvapurn hai.",translation:"This document is very important. (present)"}],id:"bulk_1780190526562_73"},{devanagari:"पर",transliteration:"par",meaning:"but / however / on / upon / at / regarding / concerning",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"वह आना चाहता है, पर वह नहीं आ सकता।",transliteration:"vah ānā chāhtā hai, par vah nahī̃ ā saktā.",translation:"He wants to come, but he cannot come. (present)"},{sentence:"मेज़ पर किताब है।",transliteration:"mez par kitāb hai.",translation:"The book is on the table. (present)"}],id:"bulk_1780190528553_74"},{devanagari:"परसों",transliteration:"parsõ",meaning:"the day after tomorrow / two days hence",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"परसों मेरी परीक्षा है।",transliteration:"Parsõ merī parīkṣā hai.",translation:"My exam is the day after tomorrow. (present)"},{sentence:"हम परसों दिल्ली जाएंगे।",transliteration:"Ham parsõ Dillī jāẽge.",translation:"We will go to Delhi the day after tomorrow. (future)"}],id:"bulk_1780190530759_75"},{devanagari:"परिवार",transliteration:"parivār",meaning:"family / household / relatives",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"मेरा परिवार बहुत बड़ा है।",transliteration:"merā parivār bahut bṝā hai.",translation:"My family is very large. (present)"},{sentence:"हम सभी परिवार के साथ छुट्टियाँ मनाते हैं।",transliteration:"ham sabhī parivār ke sāth chhuttiȳāñ mnāte haiñ.",translation:"We all celebrate holidays together with family. (present habitual)"}],id:"bulk_1780190532910_76"},{devanagari:"पश्चिम",transliteration:"paścim",meaning:"west / western / westward",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"सूरज पश्चिम में डूब रहा है।",transliteration:"Sūraj paścim mẽ ḍūb rahā hai.",translation:"The sun is setting in the west. (present continuous)"},{sentence:"हम पश्चिम दिशा की ओर चल रहे हैं।",transliteration:"Ham paścim diśā kī or chal rahe hain.",translation:"We are moving towards the western direction. (present continuous)"}],id:"bulk_1780190534916_77"},{devanagari:"पसंद",transliteration:"pasand",meaning:"preference / liking / choice / to like / to please",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"मुझे यह किताब बहुत पसंद है।",transliteration:"Mujhe yah kitaab bahut pasand hai.",translation:"I like this book very much. (present)"},{sentence:"उसे कौन सा खेल पसंद है?",transliteration:"Use kaun sa khel pasand hai?",translation:"Which sport does he/she like? (present)"}],id:"bulk_1780190536764_78"},{devanagari:"पसंद आना",transliteration:"pasand ānā",meaning:"to like / to be pleasing / to appeal to",category:"verb",gender:null,transitive:!1,unit:null,examples:[{sentence:"मुझे यह फिल्म बहुत पसंद आई।",transliteration:"mujhe yah film bahut pasand āī.",translation:"I liked this film very much. (past)"},{sentence:"क्या तुम्हें यह किताब पसंद आती है?",transliteration:"kyā tumhẽ yah kitāb pasand ātī hai?",translation:"Do you like this book? (present)"}],id:"bulk_1780190538978_79"},{devanagari:"पहला",transliteration:"pahlā",meaning:"first / primary / initial",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"यह मेरा पहला दिन स्कूल में है।",transliteration:"Yah merā pahlā din skūl mẽ hai.",translation:"This is my first day at school. (present)"},{sentence:"पहला सवाल बहुत आसान था।",transliteration:"Pahlā savāl bahut āsān thā.",translation:"The first question was very easy. (past)"}],id:"bulk_1780190540897_80"},{devanagari:"पहाड़",transliteration:"pahāṛ",meaning:"mountain / hill",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"हिमालय एक बहुत बड़ा पहाड़ है।",transliteration:"Himālaya ek bahut baṛā pahāṛ hai.",translation:"The Himalayas are a very large mountain. (present)"},{sentence:"हम कल पहाड़ पर चढ़ने जाएँगे।",transliteration:"Ham kal pahāṛ par chaṛhne jāeṁ ge.",translation:"We will go to climb the mountain tomorrow. (future)"}],id:"bulk_1780190543047_81"},{devanagari:"पहुँचना",transliteration:"pahũchnā",meaning:"to reach / to arrive / to attain / to extend to",category:"verb",gender:null,transitive:!1,unit:null,examples:[{sentence:"मैं कल दिल्ली पहुँचूँगा।",transliteration:"maiṁ kal dillī pahũchūgā.",translation:"I will reach Delhi tomorrow. (future)"},{sentence:"वह समय पर स्कूल पहुँच गया।",transliteration:"vah samay par skūl pahũch gayā.",translation:"He reached school on time. (past)"}],id:"bulk_1780190544994_82"},{devanagari:"पाव",transliteration:"pāv",meaning:"foot / quarter / leg",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"बच्चे के पाव बहुत नरम हैं।",transliteration:"Bacche ke pāv bahut narm haiṁ.",translation:"The child's feet are very soft. (present)"},{sentence:"उसने मेरे पाव को छुआ।",transliteration:"Usne mere pāv ko chuā.",translation:"He/She touched my foot. (past)"}],id:"bulk_1780190547041_83"},{devanagari:"पागल",transliteration:"pāgal",meaning:"mad / insane / crazy / foolish / wild",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"वह पागल आदमी हर दिन सड़क पर चिल्लाता है।",transliteration:"Vah pāgal ādmī har din sṛak par chillātā hai.",translation:"That mad man shouts on the street every day. (present)"},{sentence:"तुम मुझे पागल समझते हो क्या?",transliteration:"Tum mujhe pāgal samjhte ho kyā?",translation:"Do you think I'm crazy? (present)"}],id:"bulk_1780190549194_84"},{devanagari:"पाना",transliteration:"pānā",meaning:"to get / to obtain / to find / to reach / to catch",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"मुझे बाजार में एक अच्छी किताब पानी थी।",transliteration:"Mujhe bāzār meñ ek achhī kitāb pānī thī.",translation:"I wanted to find a good book in the market. (past)"},{sentence:"क्या तुम्हें मेरा फोन नंबर पता है?",transliteration:"Kyā tumheñ merā fon nambar patā hai?",translation:"Do you have/know my phone number? (present)"}],id:"bulk_1780190551859_85"},{devanagari:"मैं नहीं जा पाया",transliteration:"maiṁ nahī̃ jā payā",meaning:"I could not go / I was unable to go / I failed to go",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"मैं नहीं जा पाया क्योंकि मेरी बाइक खराब थी।",transliteration:"maiṁ nahī̃ jā payā kyõki merī bāik kharāb thī.",translation:"I could not go because my bike was broken. (past)"},{sentence:"वह कल की पार्टी में नहीं जा पाया।",transliteration:"vah kal kī pārtī mẽ nahī̃ jā payā.",translation:"He was unable to go to yesterday's party. (past)"}],id:"bulk_1780190554415_86"},{devanagari:"पानी",transliteration:"pānī",meaning:"water",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"मुझे एक गिलास पानी दीजिए।",transliteration:"Mujhe ek gilās pānī dījie.",translation:"Please give me a glass of water. (imperative)"},{sentence:"यह नदी का पानी बहुत ठंडा है।",transliteration:"Yah nadī kā pānī bahut ṭhanḍā hai.",translation:"This river water is very cold. (present)"}],id:"bulk_1780190556175_87"},{devanagari:"पार करना",transliteration:"pār karnā",meaning:"to cross / to traverse / to get over / to overcome / to complete",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"उसने नदी को तैरकर पार किया।",transliteration:"usne nadī ko tairakr pār kiyā.",translation:"He crossed the river by swimming. (past)"},{sentence:"मुझे इस मुश्किल दौर को पार करना है।",transliteration:"mujhe is muśkil daur ko pār karnā hai.",translation:"I have to get through this difficult period. (present/future)"}],id:"bulk_1780190558408_88"},{devanagari:"उस पर",transliteration:"us par",meaning:"on that / on him / on her / on it / upon that",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"उस पर बहुत दबाव था।",transliteration:"us par bahut dabāv thā.",translation:"There was a lot of pressure on him/her/it. (past)"},{sentence:"मैं उस पर विश्वास करता हूँ।",transliteration:"maiṁ us par viśvās kartā hūँ.",translation:"I trust him/her/it. (present)"}],id:"bulk_1780190560353_89"},{devanagari:"पास में",transliteration:"pās mẽ",meaning:"nearby / in the vicinity / close by / at hand",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"मेरे घर के पास में एक पार्क है।",transliteration:"mere ghar ke pās mẽ ek pārk hai.",translation:"There is a park near my house. (present)"},{sentence:"क्या आपके पास में कोई किताब है?",transliteration:"kyā āpke pās mẽ koī kitāb hai?",translation:"Do you have any book nearby? (present)"}],id:"bulk_1780190562197_90"},{devanagari:"पिछला",transliteration:"pichlā",meaning:"previous / last / rear / back",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"पिछले महीने में मैंने एक नई नौकरी शुरू की।",transliteration:"pichlē mahīnē mēṁ maiṁnē ēk naī naukarī śurū kī.",translation:"I started a new job last month. (past)"},{sentence:"पिछली बार हम दिल्ली गए थे।",transliteration:"pichlī bār ham dillī gaē thē.",translation:"We went to Delhi the previous time. (past)"}],id:"bulk_1780190564551_91"},{devanagari:"पिता",transliteration:"pitā",meaning:"father",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"मेरा पिता एक शिक्षक हैं।",transliteration:"merā pitā ek śikṣak haiṁ.",translation:"My father is a teacher. (present)"},{sentence:"पिता ने अपने बेटे को पढ़ाई करने की सलाह दी।",transliteration:"pitā ne apne beṭe ko paṛhāī karne kī salāh dī.",translation:"The father advised his son to study. (past)"}],id:"bulk_1780190566397_92"},{devanagari:"पीटना",transliteration:"pīṭnā",meaning:"to beat / to strike / to hit / to thrash",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"उसने गुस्से में मेज को पीटा।",transliteration:"Usne gusse mein mez ko pīṭā.",translation:"He beat the table in anger. (past)"},{sentence:"बच्चों को पीटना सही नहीं है।",transliteration:"Bachchon ko pīṭnā sahī nahī̃ hai.",translation:"Beating children is not right. (present habitual)"}],id:"bulk_1780190568340_93"},{devanagari:"पीना",transliteration:"pīnā",meaning:"to drink / to consume (a liquid)",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"मैं रोज सुबह दूध पीता हूँ।",transliteration:"Maiṁ roz subah dūdh pītā hūँ.",translation:"I drink milk every morning. (present habitual)"},{sentence:"क्या तुम पानी पीना चाहते हो?",transliteration:"Kyā tum pānī pīnā chāhte ho?",translation:"Do you want to drink water? (present)"}],id:"bulk_1780537487399_0"},{devanagari:"पीला",transliteration:"pīlā",meaning:"yellow / pale / jaundiced",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"आसमान में पीला सूरज डूब रहा है।",transliteration:"āsmān mein pīlā sūraj ḍūb rahā hai.",translation:"A yellow sun is setting in the sky. (present continuous)"},{sentence:"उसका चेहरा बीमारी से पीला पड़ गया।",transliteration:"uska chehrā bīmārī se pīlā pad gayā.",translation:"His face turned pale from illness. (past)"}],id:"bulk_1780537489651_1"},{devanagari:"पुकारना",transliteration:"pukārnā",meaning:"to call / to summon / to cry out / to shout",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"माता ने बाहर से बेटे को पुकारा।",transliteration:"mātā ne bāhar se beṭe ko pukārā.",translation:"The mother called her son from outside. (past)"},{sentence:"वह हर दिन मुझे पुकारता है।",transliteration:"vah har din mujhe pukārtā hai.",translation:"He calls me every day. (present)"}],id:"bulk_1780537491596_2"},{devanagari:"पुराना",transliteration:"purānā",meaning:"old / ancient / outdated",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"यह पुराना घर बहुत सुंदर है।",transliteration:"yah purānā ghar bahut sundar hai.",translation:"This old house is very beautiful. (present)"},{sentence:"मेरे पुराने दोस्त कल मिलने आ रहे हैं।",transliteration:"mere purāne dost kal milne ā rahe hain.",translation:"My old friends are coming to meet tomorrow. (present)"}],id:"bulk_1780537493637_3"},{devanagari:"पुल",transliteration:"pul",meaning:"bridge / footbridge",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"नदी के ऊपर एक बड़ा पुल है।",transliteration:"nadī ke ūpar ek bāṛā pul hai.",translation:"There is a big bridge over the river. (present)"},{sentence:"हम पुल से गाँव जाते हैं।",transliteration:"ham pul se gāñv jāte haiṁ.",translation:"We go to the village via the bridge. (present)"}],id:"bulk_1780537495546_4"},{devanagari:"पुलिस",transliteration:"pulis",meaning:"police / police force",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"पुलिस ने चोर को पकड़ा।",transliteration:"pulis ne chor ko pakṛā.",translation:"The police caught the thief. (past)"},{sentence:"पुलिस वालों ने उसे गिरफ्तार किया।",transliteration:"pulis wālon ne use giraftār kiyā.",translation:"The police officers arrested him. (past)"}],id:"bulk_1780537497332_5"},{devanagari:"पुस्तकालय",transliteration:"pustakālay",meaning:"library / repository of books",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"मैं हर सप्ताह पुस्तकालय जाता हूँ।",transliteration:"maiṃ har saptāh pustakālay jātā hūँ.",translation:"I go to the library every week. (present habitual)"},{sentence:"इस शहर का पुस्तकालय बहुत बड़ा और आधुनिक है।",transliteration:"is śahr kā pustakālay bahut bṛā aur ādhunīk hai.",translation:"This city's library is very large and modern. (present)"}],id:"bulk_1780537499585_6"},{devanagari:"पूछना",transliteration:"pūchnā",meaning:"to ask / to inquire / to question",category:"verb",gender:null,transitive:!0,unit:null,examples:[{sentence:"मैं तुमसे एक सवाल पूछना चाहता हूँ।",transliteration:"maiṁ tumse ek savāl pūchnā chāhtā hūँ.",translation:"I want to ask you a question. (present)"},{sentence:"उसने मुझसे मेरा नाम पूछा।",transliteration:"usnē mujhse merā nām pūchā.",translation:"He/She asked me my name. (past)"}],id:"bulk_1780537502086_7"},{devanagari:"पूरा",transliteration:"pūrā",meaning:"whole / entire / complete / full",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"मैंने पूरी किताब एक दिन में पढ़ी।",transliteration:"Mainne pūrī kitāb ek din mein padhī.",translation:"I read the entire book in one day. (past)"},{sentence:"उसन amples:[{sentence:"मुझे बहुत प्यास लगी है।",transliteration:"mujhe bahut pyās lagī hai.",translation:"I am very thirsty. (present)"},{sentence:"उसकी ज्ञान की प्यास कभी बुझती नहीं।",transliteration:"uskī gyān kī pyās kabhī bujhtī nahīṁ.",translation:"His thirst for knowledge is never quenched. (present habitual)"}],id:"bulk_1780537524002_17"},{devanagari:"प्यास लगना",transliteration:"pyās lagnā",meaning:"to feel thirsty / to be thirsty / to have thirst",category:"verb",gender:null,transitive:!1,unit:null,examples:[{sentence:"गर्मी में मुझे बहुत प्यास लगती है।",transliteration:"garmī meṁ mujhe bahut pyās lagtī hai.",translation:"I feel very thirsty in the heat. (present habitual)"},{sentence:"खेल के बाद उसे तेज प्यास लग गई।",transliteration:"khel ke bād use tez pyās lag gaī.",translation:"After playing, he became very thirsty. (past)"}],id:"bulk_1780537526470_18"},{devanagari:"प्रदेश",transliteration:"pradeś",meaning:"region / state / territory / province / area",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"भारत के उत्तर प्रदेश में बहुत बड़ी आबादी रहती है।",transliteration:"bhārat ke uttar pradeś mẽ bahut bṛī ābbādī rahtī hai.",translation:"Uttar Pradesh, a state in India, has a very large population. (present)"},{sentence:"मध्य प्रदेश के जंगलों में कई वन्य जीव पाए जाते हैं।",transliteration:"madhy pradeś ke jãglon mẽ kaī vany jīv pāe jāte haiṁ.",translation:"Many wild animals are found in the forests of Madhya Pradesh. (present)"}],id:"bulk_1780537529168_19"},{devanagari:"प्रधान मंत्री",transliteration:"pradhān mantri",meaning:"Prime Minister / chief minister",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"भारत के प्रधान मंत्री संसद में बोलते हैं।",transliteration:"bhārat ke pradhān mantri sansad mẽ bolte haiṁ.",translation:"The Prime Minister of India speaks in Parliament. (present)"},{sentence:"नरेंद्र मोदी भारत के प्रधान मंत्री हैं।",transliteration:"narendra modi bhārat ke pradhān mantri haiṁ.",translation:" :"m",transitive:null,unit:null,examples:[{sentence:"मेरा फ़ोन बैटरी खत्म हो गई।",transliteration:"merā phon baiṭrī khatm ho gaī.",translation:"My phone battery is dead. (present)"},{sentence:"कल मुझे फ़ोन पर एक महत्वपूर्ण कॉल मिली।",transliteration:"kal mujhe phon par ek mahatvpurn kol milī.",translation:"I received an important call on the phone yesterday. (past)"}],id:"bulk_1780537552499_29"},{devanagari:"बंद",transliteration:"band",meaning:"closed / shut / blocked / stopped / imprisoned / confined",category:"other",gender:null,transitive:null,unit:null,examples:[{sentence:"दरवाज़ा बंद है।",transliteration:"darvāzā band hai.",translation:"The door is closed. (present)"},{sentence:"दुकान बंद कर दो।",transliteration:"dukān band kar do.",translation:"Close the shop. (imperative)"}],id:"bulk_1780537554404_30"},{devanagari:"बकवास",transliteration:"bakvās",meaning:"nonsense / rubbish / idle talk / chatter",category:"noun",gender:"f",transitive:null,unit:null,examples:[{sentence:"वह हमेशा बकवास करता है।",transliteration:"Vah hameshā bakvās kartā hai.",translation:"He always talks nonsense. (present)"},{sentence:"मुझे उसकी बकवास सुनना पसंद नहीं है।",transliteration:"Mujhe uskī bakvās sunná pasand nahī̃ hai.",translation:"I don't like listening to his rubbish talk. (present)"}],id:"bulk_1780537556853_31"},{devanagari:"बगीचा",transliteration:"bagīchā",meaning:"garden / orchard",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"मेरे घर के पास एक सुंदर बगीचा है।",transliteration:"mere ghar ke pās ek sundar bagīchā hai.",translation:"There is a beautiful garden near my house. (present)"},{sentence:"बच्चों को बगीचे में खेलना पसंद है।",transliteration:"bachchon ko bagīche mein khelnā pasand hai.",translation:"Children like to play in the garden. (present)"}],id:"bulk_1780537559054_32"},{devanagari:"बचपन",transliteration:"bacpan",meaning:"childhood / infancy / boyhood",category:"noun",gender:"m",transitive:null,unit:null,examples:[{sentence:"मेरा बचपन गाँव
