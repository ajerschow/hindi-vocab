name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual runs from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; cancel any in-progress run
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # VITE_ANTHROPIC_API_KEY is intentionally NOT set here.
        # When the key is absent the built HTML automatically hides the
        # "+ Add word" button, so no secret is ever baked into the file.

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist   # vite-plugin-singlefile puts dist/index.html here

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
